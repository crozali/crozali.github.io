<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crozali | Магазин преміального взуття</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; scroll-behavior: smooth; }
        .nav-blur { background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .product-card { background: #111; border: 1px solid #222; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { border-color: #3b82f6; transform: translateY(-5px); box-shadow: 0 20px 40px rgba(59, 130, 246, 0.1); }
        .slider-btn { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); transition: 0.3s; }
        .slider-btn:hover { background: #3b82f6; }
        .gradient-text { background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .social-link { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1); }
        .social-link:hover { transform: scale(1.1); border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

   <script type="text/babel">
        const { useState } = React;

        const INITIAL_PRODUCTS = [
            {
                id: '1',
                name: 'Чоловічі Монкі',
                gender: 'male',
                price: 3000,
                images: [
                    'https://i.ibb.co/rWJwTzn/2026-03-17-154838389.png',
                    'https://i.ibb.co/PZQZqMft/image.png',
                    'https://i.ibb.co/2YSYVpDQ/image.png'
                ],
                description: 'Класика, що не потребує представлення. Ідеальний комфорт та стиль.'
            },
            {
                id: '2',
                name: 'Жіноча класика',
                gender: 'female',
                price: 2500,
                images: [
                    'https://i.ibb.co/qYB5xSy5/image.png',
                    'https://i.ibb.co/xqV4vRJb/image.png',
                    'https://i.ibb.co/bR3bRqmr/image.png'
                ],
                description: 'Масивна підошва та преміальна шкіра. Твій зухвалий акцент у щоденному образі.'
            },
            {
                id: '3',
                name: 'Туфлі жіночі класичні чорні',
                price: 2500,
                gender: 'female',
                images: [
                    'https://i.ibb.co/rfNTYj7b/image.png', 
                    'https://i.ibb.co/whD7q7zV/image.png', 
                    'https://i.ibb.co/VpjDhLGb/image.png'
                ],
                description: 'Класичні жіночі туфлі каблук 6 см, натур шкіра, натуральний підклад шевро'
            }
        ];

        function ProductCard({ product }) {
            const [currentImg, setCurrentImg] = useState(0);
            const next = (e) => { e.preventDefault(); setCurrentImg(prev => (prev === product.images.length - 1 ? 0 : prev + 1)); };
            const prev = (e) => { e.preventDefault(); setCurrentImg(prev => (prev === 0 ? product.images.length - 1 : prev - 1)); };
            
            const phone = "380673485909";
            const viberMsg = encodeURIComponent(`Добрий день! Мене зацікавила модель: ${product.name}`);
            const viberUrl = `viber://chat?number=%2B${phone}&draft=${viberMsg}`;

            return (
                <div className="product-card rounded-3xl overflow-hidden flex flex-col h-full group">
                    <div className="relative h-72 overflow-hidden">
                        <img src={product.images[currentImg]} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                        <div className="absolute inset-0 flex items-center justify-between px-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={prev} className="slider-btn w-10 h-10 rounded-full text-white">❮</button>
                            <button onClick={next} className="slider-btn w-10 h-10 rounded-full text-white">❯</button>
                        </div>
                    </div>
                    <div className="p-6 flex flex-col flex-grow">
                        <h3 className="text-xl font-bold mb-2">{product.name}</h3>
                        <p className="text-gray-400 text-sm mb-6 flex-grow leading-relaxed">{product.description}</p>
                        
                        <div className="flex flex-col gap-3">
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-2xl font-extrabold text-blue-500">{product.price} ₴</span>
                                <a href={`tel:${phone}`} className="bg-white text-black px-4 py-2 rounded-xl font-bold hover:bg-gray-200 transition-colors text-sm">Дзвінок</a>
                            </div>
                            <a href={viberUrl} className="w-full bg-[#7360f2] text-white py-3 rounded-xl font-bold hover:bg-[#6251d4] transition-colors text-center flex items-center justify-center gap-2">
                                <span>💬</span> Написати у Viber
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [filter, setFilter] = useState('all');
            const filtered = INITIAL_PRODUCTS.filter(p => filter === 'all' || p.gender === filter);

            return (
                <div className="min-h-screen">
                    <nav className="fixed top-0 w-full z-50 nav-blur">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
                            <span className="text-2xl font-extrabold tracking-tighter">CROZALI</span>
                            <div className="hidden md:flex gap-8 text-sm font-bold uppercase tracking-widest">
                                <a href="#catalog" className="hover:text-blue-500 transition">Каталог</a>
                                <a href="#about" className="hover:text-blue-500 transition">Про нас</a>
                                <a href="#contacts" className="hover:text-blue-500 transition">Контакти</a>
                            </div>
                        </div>
                    </nav>

                    <section className="pt-40 pb-20 px-6 text-center">
                        <h1 className="text-6xl md:text-8xl font-extrabold mb-6 gradient-text tracking-tighter">STEP INTO FUTURE</h1>
                        <p className="text-gray-400 text-xl max-w-2xl mx-auto mb-10">Твій стиль починається з кроку. Найкраще шкіряне взуття вже тут!</p>
                        <a href="#catalog" className="inline-block bg-blue-600 px-10 py-4 rounded-2xl font-extrabold hover:bg-blue-700 transition transform hover:scale-105 shadow-2xl shadow-blue-500/20">ПЕРЕГЛЯНУТИ КАТАЛОГ</a>
                    </section>

                    <section id="catalog" className="py-24 px-6 max-w-6xl mx-auto">
                        <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
                            <div>
                                <h2 className="text-4xl font-bold mb-2 text-white">Наш каталог</h2>
                                <p className="text-gray-500">Тільки оригінальна якість та актуальні моделі</p>
                            </div>
                            <div className="flex bg-[#111] p-1.5 rounded-2xl border border-white/5">
                                {['all', 'male', 'female'].map(type => (
                                    <button 
                                        key={type}
                                        onClick={() => setFilter(type)}
                                        className={`px-8 py-2.5 rounded-xl text-sm font-bold transition ${filter === type ? 'bg-blue-600 text-white' : 'text-gray-400 hover:text-white'}`}
                                    >
                                        {type === 'all' ? 'Всі' : type === 'male' ? 'Чоловічі' : 'Жіночі'}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                            {filtered.map(p => <ProductCard key={p.id} product={p} />)}
                        </div>
                    </section>

                    <section id="about" className="py-24 bg-[#0a0a0a] border-y border-white/5">
                        <div className="max-w-4xl mx-auto px-6 text-center">
                            <h2 className="text-4xl font-bold mb-8 text-blue-500">Ми — Crozali</h2>
                            <div className="text-gray-400 space-y-6 text-lg leading-relaxed">
                                <p>Понад 8 років ми робимо нашим клієнтам шкіряне взуття, яке поєднує в собі стиль та комфорт.</p>
                                <p>Наша місія — зробити найкраще шкіряне взуття з гарантією якості. Також робимо взуття на замовлення.</p>
                            </div>
                        </div>
                    </section>

                    <footer id="contacts" className="py-24 px-6 max-w-6xl mx-auto">
                        <div className="grid md:grid-cols-2 gap-16">
                            <div>
                                <h2 className="text-5xl font-bold mb-8 text-white">Маєш питання? <br/><span className="text-blue-500">Ми на зв'язку.</span></h2>
                                <div className="space-y-6">
                                    <a href="tel:0673485909" className="flex items-center gap-4 text-2xl font-bold hover:text-blue-500 transition">
                                        <span className="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center">📞</span>
                                        067 348 59 09
                                    </a>
                                    <div className="pt-8">
                                        <h4 className="text-xl font-bold mb-6 text-white">Ми у соцмережах!</h4>
                                        <div className="flex flex-wrap gap-4">
                                            <a href="viber://chat?number=%2B380673485909" className="social-link p-4 rounded-2xl flex items-center gap-3 bg-[#111]">
                                                <span className="text-2xl">💜</span>
                                                <span className="text-sm font-bold text-gray-300">Viber</span>
                                            </a>
                                            <a href="https://t.me/Crozali" target="_blank" className="social-link p-4 rounded-2xl flex items-center gap-3 bg-[#111]">
                                                <span className="text-2xl">✈️</span>
                                                <span className="text-sm font-bold text-gray-300">Telegram</span>
                                            </a>
                                            <a href="https://www.tiktok.com/@rom4ik45" target="_blank" className="social-link p-4 rounded-2xl flex items-center gap-3 bg-[#111]">
                                                <span className="text-2xl">🎵</span>
                                                <span className="text-sm font-bold text-gray-300">TikTok</span>
                                            </a>
                                            <a href="https://wa.me/380673485909" target="_blank" className="social-link p-4 rounded-2xl flex items-center gap-3 bg-[#111]">
                                                <span className="text-2xl">🟢</span>
                                                <span className="text-sm font-bold text-gray-300">WhatsApp</span>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="bg-[#111] p-10 rounded-3xl border border-white/5 h-fit text-center">
                                <h3 className="text-xl font-bold mb-4 text-white">Графік роботи</h3>
                                <p className="text-gray-400">Пн-Пт: 10:00 — 18:00</p>
                                <p className="text-gray-400">Сб-Нд: 11:00 — 18:00</p>
                                <div className="mt-8 pt-8 border-t border-white/5">
                                    <p className="text-xs text-gray-600 uppercase tracking-widest mb-2 font-bold italic text-white">Доставка по всій Україні 📍</p>
                                    <p className="text-sm text-gray-500">© 2026 Crozali.</p>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
