<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crozali | Магазин преміального взуття</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020202; color: white; scroll-behavior: smooth; overflow-x: hidden; }
        .chaos-bg { position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='150' height='150' viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='20' fill='rgba(255,255,255,0.05)' font-family='monospace' font-size='10'%3E+%3C/text%3E%3C/svg%3E"); z-index: -1; }
        .nav-blur { background: rgba(2, 2, 2, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .product-card { background: rgba(17, 17, 17, 0.85); border: 1px solid #222; transition: all 0.4s ease; cursor: pointer; }
        .product-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
        .indicator-dot { height: 4px; border-radius: 2px; transition: all 0.3s ease; background: rgba(255,255,255,0.2); }
        .indicator-active { width: 24px; background: #3b82f6; }
        .indicator-inactive { width: 6px; }
        .gradient-text { background: linear-gradient(to right, #fff, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div class="chaos-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PRODUCTS = [
            { id: '1', name: 'Чоловічі Монкі', gender: 'male', price: 3000, images: ['https://i.ibb.co/rWJwTzn/2026-03-17-154838389.png', 'https://i.ibb.co/PZQZqMft/image.png'], description: 'Класика, що не потребує представлення. Ідеальний комфорт та стиль.' },
            { id: '2', name: 'Жіноча класика', gender: 'female', price: 2500, images: ['https://i.ibb.co/qYB5xSy5/image.png', 'https://i.ibb.co/xqV4vRJb/image.png'], description: 'Масивна підошва та преміальна шкіра.' },
            { id: '3', name: 'Туфлі жіночі чорні', gender: 'female', price: 2800, images: ['https://i.ibb.co/rfNTYj7b/image.png'], description: 'Натур шкіра, каблук 6 см.' },
            { id: '8', name: 'Чоловічі туфлі', gender: 'male', price: 2100, images: ['https://i.ibb.co/v4h5sVmx/image.png'], description: 'Чоловічі туфлі чорного кольору, натуральна шкіра.' }
        ];

        function App() {
            const [filter, setFilter] = useState('all');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const phone = "380673485909";

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <nav className="fixed top-0 w-full z-50 nav-blur">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
                            <span className="text-2xl font-extrabold tracking-tighter">CROZALI</span>
                            <div className="hidden md:flex gap-8 text-xs font-bold uppercase tracking-widest">
                                <a href="#catalog" className="hover:text-blue-500 transition">Каталог</a>
                                <a href="#about" className="hover:text-blue-500 transition">Про нас</a>
                                <a href="#contacts" className="hover:text-blue-500 transition">Контакти</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section className="pt-48 pb-20 px-6 text-center">
                        <h1 className="text-6xl md:text-8xl font-extrabold mb-6 gradient-text uppercase tracking-tighter">Step Into <br/> Future</h1>
                        <p className="text-gray-400 text-lg max-w-xl mx-auto mb-10">Преміальне шкіряне взуття ручної роботи. 8 років досвіду в кожному кроці.</p>
                        <a href="#catalog" className="inline-block bg-blue-600 px-10 py-4 rounded-xl font-bold hover:bg-blue-700 transition">КАТАЛОГ</a>
                    </section>

                    {/* Catalog Section */}
                    <section id="catalog" className="py-20 px-6 max-w-6xl mx-auto">
                        <div className="flex flex-col items-center mb-12">
                            <h2 className="text-4xl font-bold mb-6">Каталог</h2>
                            <div className="flex bg-[#111] p-1 rounded-xl border border-white/5">
                                {['all', 'male', 'female'].map(t => (
                                    <button key={t} onClick={() => setFilter(t)} className={`px-6 py-2 rounded-lg text-sm font-bold transition ${filter === t ? 'bg-blue-600' : 'text-gray-400'}`}>
                                        {t === 'all' ? 'Всі' : t === 'male' ? 'Чоловічі' : 'Жіночі'}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {PRODUCTS.filter(p => filter === 'all' || p.gender === filter).map(p => (
                                <div key={p.id} onClick={() => setSelectedProduct(p)} className="product-card rounded-2xl overflow-hidden group">
                                    <div className="h-72 bg-black/40 overflow-hidden">
                                        <img src={p.images[0]} className="w-full h-full object-cover group-hover:scale-110 transition duration-500" />
                                    </div>
                                    <div className="p-6">
                                        <h3 className="text-xl font-bold mb-1">{p.name}</h3>
                                        <p className="text-blue-500 font-extrabold text-lg">{p.price} ₴</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* About Section (Додано!) */}
                    <section id="about" className="py-24 bg-[#0a0a0a] border-y border-white/5">
                        <div className="max-w-4xl mx-auto px-6 text-center">
                            <h2 className="text-4xl font-bold mb-8 text-blue-500">Ми — Crozali</h2>
                            <p className="text-xl text-gray-300 leading-relaxed mb-12">
                                Вже понад 8 років ми створюємо взуття, яке стає частиною вашої історії. 
                                Використовуємо лише натуральну шкіру преміум-класу (шевро, нубук, замша).
                            </p>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div className="p-6 bg-white/5 rounded-2xl">
                                    <div className="text-3xl mb-3">👞</div>
                                    <h4 className="font-bold mb-2">Натуральна шкіра</h4>
                                    <p className="text-gray-400 text-sm">Тільки найкращі матеріали</p>
                                </div>
                                <div className="p-6 bg-white/5 rounded-2xl">
                                    <div className="text-3xl mb-3">⚙️</div>
                                    <h4 className="font-bold mb-2">Власне виробництво</h4>
                                    <p className="text-gray-400 text-sm">Контроль якості на кожному етапі</p>
                                </div>
                                <div className="p-6 bg-white/5 rounded-2xl">
                                    <div className="text-3xl mb-3">🎨</div>
                                    <h4 className="font-bold mb-2">Індивідуальність</h4>
                                    <p className="text-gray-400 text-sm">Робимо взуття на замовлення</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer / Contacts (Розширено соцмережами!) */}
                    <footer id="contacts" className="py-20 px-6 max-w-6xl mx-auto">
                        <div className="grid md:grid-cols-2 gap-12">
                            <div>
                                <h2 className="text-5xl font-bold mb-8 italic">Зв'яжіться <br/><span className="text-blue-500 text-not-italic">з нами</span></h2>
                                <a href={`tel:${phone}`} className="text-2xl font-bold hover:text-blue-500 transition block mb-6">
                                    📞 067 348 59 09
                                </a>
                                {/* Соцмережі */}
                                <div className="flex gap-4 mt-8">
                                    <a href="https://instagram.com" className="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center hover:bg-pink-600 transition">IG</a>
                                    <a href="https://tiktok.com" className="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center hover:bg-white hover:text-black transition">TT</a>
                                </div>
                            </div>
                            <div className="bg-[#111] p-8 rounded-3xl border border-white/5">
                                <h3 className="text-xl font-bold mb-4 uppercase tracking-widest text-gray-500">Графік</h3>
                                <p className="text-lg">Пн-Пт: 10:00 — 18:00</p>
                                <p className="text-lg">Сб-Нд: 11:00 — 18:00</p>
                                <p className="mt-6 text-gray-400 text-sm">📍 Працюємо по всій Україні</p>
                            </div>
                        </div>
                        <div className="mt-20 pt-8 border-t border-white/5 text-center text-gray-600 text-xs uppercase tracking-widest">
                            © 2026 CROZALI PREMIUM FOOTWEAR. ALL RIGHTS RESERVED.
                        </div>
                    </footer>

                    {/* Modal */}
                    {selectedProduct && (
                        <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4" onClick={() => setSelectedProduct(null)}>
                            <div className="bg-[#111] max-w-4xl w-full rounded-3xl overflow-hidden flex flex-col md:flex-row relative" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setSelectedProduct(null)} className="absolute top-4 right-4 w-10 h-10 bg-white/10 rounded-full flex items-center justify-center">✕</button>
                                <div className="md:w-1/2 h-80 md:h-auto bg-black">
                                    <img src={selectedProduct.images[0]} className="w-full h-full object-contain" />
                                </div>
                                <div className="p-8 md:w-1/2">
                                    <h2 className="text-3xl font-bold mb-4">{selectedProduct.name}</h2>
                                    <p className="text-2xl font-extrabold text-blue-500 mb-6">{selectedProduct.price} ₴</p>
                                    <p className="text-gray-400 mb-8">{selectedProduct.description}</p>
                                    <div className="grid grid-cols-2 gap-4">
                                        <a href={`viber://chat?number=%2B${phone}`} className="bg-[#7360f2] py-4 rounded-xl text-center font-bold">Viber</a>
                                        <a href={`https://wa.me/${phone}`} className="bg-[#25D366] py-4 rounded-xl text-center font-bold">WhatsApp</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
