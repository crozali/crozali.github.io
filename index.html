<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crozali | Магазин преміального взуття</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020202; 
            color: white; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
        }

        .chaos-bg {
            position: fixed;
            inset: 0;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='150' height='150' viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='20' fill='rgba(255,255,255,0.1)' font-family='monospace' font-size='10'%3E+%3C/text%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        .nav-blur { background: rgba(2, 2, 2, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .product-card { background: rgba(17, 17, 17, 0.85); border: 1px solid #222; transition: all 0.3s ease; cursor: pointer; }
        .product-card:hover { border-color: #3b82f6; }
        
        .slider-btn { 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(4px); 
            transition: 0.2s; 
        }
        .slider-btn:hover { background: #3b82f6; }

        /* Стиль для твоїх точок/ліній (пагінації) */
        .dot { height: 4px; border-radius: 2px; transition: all 0.3s ease; background: rgba(255,255,255,0.3); }
        .dot-active { width: 24px; background: #3b82f6; }
        .dot-inactive { width: 6px; }
    </style>
</head>
<body>
    <div class="chaos-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_PRODUCTS = [
            { id: '1', name: 'Чоловічі Монкі', gender: 'male', price: 3000, images: ['https://i.ibb.co/rWJwTzn/2026-03-17-154838389.png', 'https://i.ibb.co/PZQZqMft/image.png', 'https://i.ibb.co/2YSYVpDQ/image.png'], description: 'Класика, що не потребує представлення.' },
            { id: '2', name: 'Жіноча класика', gender: 'female', price: 2500, images: ['https://i.ibb.co/qYB5xSy5/image.png', 'https://i.ibb.co/xqV4vRJb/image.png', 'https://i.ibb.co/bR3bRqmr/image.png'], description: 'Масивна підошва та преміальна шкіра.' },
            { id: '3', name: 'Жіночі туфлі сірі', gender: 'female', price: 2800, images: ['https://i.ibb.co/vCMqnm4f/image.png', 'https://i.ibb.co/mCmmps5L/image.png', 'https://i.ibb.co/fd8NCwvy/image.png'], description: 'Нат шкіра шевро, каблук 6 см.' },
            // Можна додати інші моделі сюди...
        ];

        function ProductCard({ product, onOpen }) {
            const [currentImg, setCurrentImg] = useState(0);

            const next = (e) => { 
                e.stopPropagation(); 
                setCurrentImg(prev => (prev === product.images.length - 1 ? 0 : prev + 1)); 
            };
            const prev = (e) => { 
                e.stopPropagation(); 
                setCurrentImg(prev => (prev === 0 ? product.images.length - 1 : prev - 1)); 
            };

            return (
                <div onClick={() => onOpen(product)} className="product-card rounded-3xl overflow-hidden flex flex-col h-full group">
                    <div className="relative h-72 overflow-hidden bg-black">
                        <img src={product.images[currentImg]} className="w-full h-full object-cover transition-opacity duration-300" />
                        
                        {/* Кнопки вліво/вправо */}
                        <div className="absolute inset-0 flex items-center justify-between px-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                            <button onClick={prev} className="slider-btn w-10 h-10 rounded-full text-white flex items-center justify-center">❮</button>
                            <button onClick={next} className="slider-btn w-10 h-10 rounded-full text-white flex items-center justify-center">❯</button>
                        </div>

                        {/* ТІ САМІ КНОПКИ-ТОЧКИ (ДИНАМІЧНІ) */}
                        <div className="absolute bottom-4 left-0 right-0 flex justify-center gap-1.5 pointer-events-none">
                            {product.images.map((_, idx) => (
                                <div key={idx} className={`dot ${idx === currentImg ? 'dot-active' : 'dot-inactive'}`}></div>
                            ))}
                        </div>
                    </div>
                    <div className="p-6 flex flex-col flex-grow">
                        <h3 className="text-xl font-bold mb-2">{product.name}</h3>
                        <p className="text-gray-400 text-sm mb-6 flex-grow">{product.description}</p>
                        <div className="flex justify-between items-center">
                            <span className="text-2xl font-extrabold text-blue-500">{product.price} ₴</span>
                            <span className="text-blue-400 text-sm font-bold underline">Детальніше</span>
                        </div>
                    </div>
                </div>
            );
        }

        // Решта компонентів (App, Modal) залишаються такими ж, як раніше...
        function App() {
            const [selectedProduct, setSelectedProduct] = useState(null);
            return (
                <div className="min-h-screen py-24 px-6 max-w-6xl mx-auto">
                    <h2 className="text-4xl font-bold text-center mb-16">Наш каталог</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                        {INITIAL_PRODUCTS.map(p => (
                            <ProductCard key={p.id} product={p} onOpen={setSelectedProduct} />
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
