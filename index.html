<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crozali | Step Into Future</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505;
            /* Створюємо патерн з плюсиків та мінусів */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.05), transparent 80%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 60px 60px, 60px 60px;
            background-attachment: fixed;
            color: white; 
            scroll-behavior: smooth; 
            position: relative;
        }

        /* Елегантні плюсики на перетині ліній */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 0);
            background-size: 60px 60px;
            background-position: -1px -1px;
            pointer-events: none;
            z-index: -1;
        }

        /* Додаємо символи +- у стилі коду */
        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' fill='rgba(255,255,255,0.03)' font-family='monospace' font-size='10'%3E+%3C/text%3E%3Ctext x='60' y='80' fill='rgba(255,255,255,0.03)' font-family='monospace' font-size='10'%3E-%3C/text%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        .nav-blur { background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .product-card { background: rgba(17, 17, 17, 0.8); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; cursor: pointer; backdrop-filter: blur(4px); }
        .product-card:hover { border-color: #3b82f6; transform: translateY(-5px); box-shadow: 0 20px 40px rgba(59, 130, 246, 0.1); }
        .slider-btn { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); transition: 0.2s; z-index: 30; }
        .slider-btn:hover { background: #3b82f6; transform: scale(1.1); }
        .gradient-text { background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-overlay { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); animation: fadeIn 0.3s ease; }
        .smooth-img { backface-visibility: hidden; transform: translateZ(0); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_PRODUCTS = [
            { id: '1', name: 'Чоловічі Монкі', gender: 'male', price: 3000, images: ['https://i.ibb.co/rWJwTzn/2026-03-17-154838389.png', 'https://i.ibb.co/PZQZqMft/image.png', 'https://i.ibb.co/2YSYVpDQ/image.png'], description: 'Класика, що не потребує представлення. Ідеальний комфорт та стиль.' },
            { id: '2', name: 'Жіноча класика', gender: 'female', price: 2500, images: ['https://i.ibb.co/qYB5xSy5/image.png', 'https://i.ibb.co/xqV4vRJb/image.png', 'https://i.ibb.co/bR3bRqmr/image.png'], description: 'Масивна підошва та преміальна шкіра. Твій зухвалий акцент у щоденному образі.' },
            { id: '3', name: 'Туфлі жіночі класичні чорні', gender: 'female', price: 2800, images: ['https://i.ibb.co/rfNTYj7b/image.png', 'https://i.ibb.co/whD7q7zV/image.png', 'https://i.ibb.co/VpjDhLGb/image.png'], description: 'Класичні жіночі туфлі каблук 6 см, натур шкіра, натуральний підклад шевро' },
            { id: '4', name: 'Жіночі туфлі коричневі', gender: 'female', price: 2800, images: ['https://i.ibb.co/ZRbL14xg/image.png', 'https://i.ibb.co/TB9q4zqv/image.png', 'https://i.ibb.co/sp5q14Sz/image.png'], description: 'Нат шкіра шевро, каблук 6 см. Твій ідеальний стиль на кожен день.' },
            { id: '5', name: 'Жіночі туфлі сірі', gender: 'female', price: 2800, images: ['https://i.ibb.co/vCMqnm4f/image.png', 'https://i.ibb.co/mCmmps5L/image.png', 'https://i.ibb.co/fd8NCwvy/image.png'], description: 'Нат шкіра шевро, каблук 6 см. Взуття, що закохує з першого погляду.' },
            { id: '6', name: 'Туфлі жіночі бузкового кольору', gender: 'female', price: 2800, images: ['https://i.ibb.co/9k1mMyFr/image.png', 'https://i.ibb.co/7JVHjzy9/image.png', 'https://i.ibb.co/jkp4yZpn/image.png'], description: 'Каблуки жіночі натур шкіра, каблук 6 см, бузковий колір.' },
            { id: '7', name: 'Чоловічі кеди', gender: 'male', price: 2450, images: ['https://i.ibb.co/cX6qww3h/image.png', 'https://i.ibb.co/1fdLCw5P/image.png', 'https://i.ibb.co/tTV2BsK3/image.png'], description: 'Чоловічі кеди коричневого кольору, нубук + замша (натур шкіра).' },
            { id: '8', name: 'Чоловічі туфлі', gender: 'male', price: 2100, images: ['https://i.ibb.co/v4h5sVmx/image.png', 'https://i.ibb.co/wZS25Kry/image.png', 'https://i.ibb.co/yvKbvZw/image.png'], description: 'Чоловічі туфлі чорного кольору, натуральна шкіра.' }
        ];

        function ProductCard({ product, onOpen }) {
            const [currentImg, setCurrentImg] = useState(0);
            const next = (e) => { e.stopPropagation(); setCurrentImg(prev => (prev === product.images.length - 1 ? 0 : prev + 1)); };
            const prev = (e) => { e.stopPropagation(); setCurrentImg(prev => (prev === 0 ? product.images.length - 1 : prev - 1)); };

            return (
                <div onClick={() => onOpen(product)} className="product-card rounded-3xl overflow-hidden flex flex-col h-full group">
                    <div className="relative h-72 overflow-hidden bg-black/40">
                        <img key={product.images[currentImg]} src={product.images[currentImg]} className="smooth-img w-full h-full object-cover transition-opacity duration-300 ease-in-out" />
                        <div className="absolute inset-0 flex items-center justify-between px-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={prev} className="slider-btn w-10 h-10 rounded-full text-white flex items-center justify-center text-sm">❮</button>
                            <button onClick={next} className="slider-btn w-10 h-10 rounded-full text-white flex items-center justify-center text-sm">❯</button>
                        </div>
                        <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 z-20">
                            {product.images.map((_, i) => (
                                <div key={i} className={`w-1.5 h-1.5 rounded-full transition-all ${i === currentImg ? 'bg-blue-500 w-4' : 'bg-white/30'}`} />
                            ))}
                        </div>
                    </div>
                    <div className="p-6 flex flex-col flex-grow text-white">
                        <h3 className="text-xl font-bold mb-2 tracking-tight">{product.name}</h3>
                        <p className="text-gray-400 text-sm mb-6 flex-grow line-clamp-2">{product.description}</p>
                        <div className="flex justify-between items-center">
                            <span className="text-2xl font-extrabold text-blue-500">{product.price} ₴</span>
                            <span className="text-blue-400 text-sm font-bold uppercase tracking-wider">Деталі</span>
                        </div>
                    </div>
                </div>
            );
        }

        function Modal({ product, onClose }) {
            const [currentImg, setCurrentImg] = useState(0);
            const phone = "380673485909";
            const viberUrl = `viber://chat?number=%2B${phone}&draft=${encodeURIComponent("Добрий день! Цікавить модель: " + product.name)}`;

            useEffect(() => { document.body.style.overflow = 'hidden'; return () => { document.body.style.overflow = 'unset'; }; }, []);

            return (
                <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4 md:p-8" onClick={onClose}>
                    <div className="bg-[#111] w-full max-w-5xl max-h-[90vh] rounded-3xl overflow-hidden flex flex-col md:flex-row relative shadow-2xl border border-white/5" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-4 right-4 z-10 w-12 h-12 bg-black/50 hover:bg-red-500/50 rounded-full text-white text-xl flex items-center justify-center transition-colors">✕</button>
                        <div className="w-full md:w-3/5 h-[40vh] md:h-auto relative bg-black">
                            <img src={product.images[currentImg]} className="smooth-img w-full h-full object-contain" />
                            <div className="absolute inset-0 flex items-center justify-between px-4">
                                <button onClick={() => setCurrentImg(prev => (prev === 0 ? product.images.length - 1 : prev - 1))} className="slider-btn w-12 h-12 rounded-full text-white flex items-center justify-center">❮</button>
                                <button onClick={() => setCurrentImg(prev => (prev === product.images.length - 1 ? 0 : prev + 1))} className="slider-btn w-12 h-12 rounded-full text-white flex items-center justify-center">❯</button>
                            </div>
                        </div>
                        <div className="w-full md:w-2/5 p-8 flex flex-col overflow-y-auto bg-[#111]">
                            <h2 className="text-3xl font-bold mb-4">{product.name}</h2>
                            <div className="text-3xl font-extrabold text-blue-500 mb-6">{product.price} ₴</div>
                            <div className="mb-8 flex-grow">
                                <h4 className="text-gray-500 uppercase text-xs font-bold tracking-widest mb-2">Опис моделі</h4>
                                <p className="text-gray-300 leading-relaxed text-lg">{product.description}</p>
                            </div>
                            <div className="space-y-4">
                                <a href={viberUrl} className="w-full bg-[#7360f2] text-white py-4 rounded-2xl font-bold hover:bg-[#6251d4] transition-colors text-center flex items-center justify-center gap-3">
                                    💬 Замовити у Viber
                                </a>
                                <a href={`tel:${phone}`} className="w-full bg-white text-black py-4 rounded-2xl font-bold hover:bg-gray-200 transition-colors text-center flex items-center justify-center gap-3">
                                    📞 Швидкий дзвінок
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [filter, setFilter] = useState('all');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const filtered = INITIAL_PRODUCTS.filter(p => filter === 'all' || p.gender === filter);

            return (
                <div className="min-h-screen">
                    <nav className="fixed top-0 w-full z-50 nav-blur h-20 px-6">
                        <div className="max-w-6xl mx-auto h-full flex justify-between items-center">
                            <span className="text-2xl font-black tracking-tighter">CROZALI</span>
                            <div className="hidden md:flex gap-8 text-xs font-bold uppercase tracking-widest text-gray-400">
                                <a href="#catalog" className="hover:text-blue-500 transition">Каталог</a>
                                <a href="#contacts" className="hover:text-blue-500 transition">Контакти</a>
                            </div>
                        </div>
                    </nav>

                    <section className="pt-48 pb-24 px-6 text-center">
                        <h1 className="text-6xl md:text-[100px] font-black mb-6 gradient-text tracking-tighter uppercase leading-[0.9]">Step Into<br/>Future</h1>
                        <p className="text-gray-500 text-lg md:text-xl max-w-xl mx-auto mb-12 font-medium">Створюємо взуття для тих, хто не звик озиратися назад.</p>
                        <a href="#catalog" className="inline-block bg-blue-600 px-12 py-5 rounded-2xl font-bold hover:bg-blue-700 transition shadow-xl shadow-blue-500/20 uppercase tracking-widest text-sm">Відкрити каталог</a>
                    </section>

                    <section id="catalog" className="py-24 px-6 max-w-6xl mx-auto">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-16 gap-8">
                            <h2 className="text-4xl font-bold">Нова колекція</h2>
                            <div className="flex bg-[#111] p-1 rounded-2xl border border-white/5">
                                {['all', 'male', 'female'].map(t => (
                                    <button key={t} onClick={() => setFilter(t)} className={`px-8 py-2.5 rounded-xl text-xs font-bold transition uppercase tracking-widest ${filter === t ? 'bg-blue-600 text-white' : 'text-gray-500 hover:text-white'}`}>
                                        {t === 'all' ? 'Всі' : t === 'male' ? 'Men' : 'Women'}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {filtered.map(p => <ProductCard key={p.id} product={p} onOpen={setSelectedProduct} />)}
                        </div>
                    </section>

                    {selectedProduct && <Modal product={selectedProduct} onClose={() => setSelectedProduct(null)} />}

                    <footer id="contacts" className="py-24 px-6 max-w-6xl mx-auto border-t border-white/5 text-center md:text-left">
                        <div className="grid md:grid-cols-2 gap-12">
                            <div>
                                <h2 className="text-4xl font-bold mb-4">Crozali Shoes</h2>
                                <p className="text-gray-500 mb-8 max-w-md">Ваш крок у майбутнє починається з правильної пари. Якість, підтверджена часом.</p>
                                <div className="flex flex-col gap-4">
                                    <a href="tel:0673485909" className="text-2xl font-bold hover:text-blue-500 transition tracking-tight">067 348 59 09</a>
                                </div>
                            </div>
                            <div className="flex flex-col justify-center items-center md:items-end">
                                <div className="text-center bg-white/5 p-8 rounded-3xl border border-white/5 w-full max-w-xs">
                                    <h3 className="text-xs font-bold uppercase tracking-[0.3em] text-blue-500 mb-4">Showroom</h3>
                                    <p className="text-lg">Пн-Нд: 10:00 — 18:00</p>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
