<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crozali | Магазин преміального взуття</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020202; color: white; scroll-behavior: smooth; position: relative; overflow-x: hidden; }
        .chaos-bg { position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='150' height='150' viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='20' fill='rgba(255,255,255,0.18)' font-family='monospace' font-size='10'%3E+%3C/text%3E%3Ctext x='100' y='40' fill='rgba(255,255,255,0.18)' font-family='monospace' font-size='10'%3E-%3C/text%3E%3C/svg%3E"), url("data:image/svg+xml,%3Csvg width='250' height='250' viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='30' y='200' fill='rgba(255,255,255,0.28)' font-family='monospace' font-size='16'%3E-%3C/text%3E%3C/svg%3E"); background-size: 150px 150px, 250px 250px; pointer-events: none; z-index: -1; }
        .nav-blur { background: rgba(2, 2, 2, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .product-card { background: rgba(17, 17, 17, 0.85); border: 1px solid #222; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; backdrop-filter: blur(4px); position: relative; }
        .product-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
        .slider-btn { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); transition: 0.3s; z-index: 5; }
        .slider-btn:hover { background: #3b82f6; }
        .indicator-dot { height: 4px; border-radius: 2px; transition: all 0.3s ease; background: rgba(255,255,255,0.3); }
        .indicator-active { width: 24px; background: #3b82f6; }
        .indicator-inactive { width: 6px; }
        .gradient-text { background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-overlay { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .admin-glow { border: 1px solid #3b82f6 !important; box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        input, select, textarea { background: #111 !important; border: 1px solid #333 !important; color: white !important; outline: none; }
        input:focus { border-color: #3b82f6 !important; }
    </style>
</head>
<body>
    <div class="chaos-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_DATA = [
            { id: '1', name: 'Чоловічі Монкі', gender: 'male', price: 3000, images: ['https://i.ibb.co/rWJwTzn/2026-03-17-154838389.png', 'https://i.ibb.co/PZQZqMft/image.png', 'https://i.ibb.co/2YSYVpDQ/image.png'], description: 'Класика, що не потребує представлення. Ідеальний комфорт та стиль.' },
            { id: '2', name: 'Жіноча класика', gender: 'female', price: 2500, images: ['https://i.ibb.co/qYB5xSy5/image.png', 'https://i.ibb.co/xqV4vRJb/image.png', 'https://i.ibb.co/bR3bRqmr/image.png'], description: 'Масивна підошва та преміальна шкіра. Твій зухвалий акцент у щоденному образі.' },
            { id: '3', name: 'Туфлі жіночі класичні чорні', gender: 'female', price: 2800, images: ['https://i.ibb.co/rfNTYj7b/image.png', 'https://i.ibb.co/whD7q7zV/image.png', 'https://i.ibb.co/VpjDhLGb/image.png'], description: 'Класичні жіночі туфлі каблук 6 см, натур шкіра, натуральний підклад шевро' }
        ];

        function ProductCard({ product, onOpen, isAdmin, onDelete }) {
            const [currentImg, setCurrentImg] = useState(0);
            const next = (e) => { e.stopPropagation(); setCurrentImg(prev => (prev === product.images.length - 1 ? 0 : prev + 1)); };
            const prev = (e) => { e.stopPropagation(); setCurrentImg(prev => (prev === 0 ? product.images.length - 1 : prev - 1)); };

            return (
                <div onClick={() => onOpen(product)} className={`product-card rounded-3xl overflow-hidden flex flex-col h-full group ${isAdmin ? 'admin-glow' : ''}`}>
                    {isAdmin && (
                        <button onClick={(e) => { e.stopPropagation(); onDelete(product.id); }} className="absolute top-4 right-4 z-[20] bg-red-600 w-8 h-8 rounded-full flex items-center justify-center text-white shadow-xl hover:scale-110 transition">✕</button>
                    )}
                    <div className="relative h-72 overflow-hidden bg-black/40">
                        <img src={product.images[currentImg]} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                        <div className="absolute inset-0 flex items-center justify-between px-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={prev} className="slider-btn w-10 h-10 rounded-full text-white flex items-center justify-center text-xs">❮</button>
                            <button onClick={next} className="slider-btn w-10 h-10 rounded-full text-white flex items-center justify-center text-xs">❯</button>
                        </div>
                    </div>
                    <div className="p-6 flex flex-col flex-grow">
                        <h3 className="text-xl font-bold mb-2">{product.name}</h3>
                        <p className="text-gray-400 text-sm mb-6 flex-grow line-clamp-2">{product.description}</p>
                        <div className="flex justify-between items-center mt-auto">
                            <span className="text-2xl font-extrabold text-blue-500">{product.price} ₴</span>
                            <span className="text-blue-400 text-sm font-bold underline uppercase tracking-widest">Огляд</span>
                        </div>
                    </div>
                </div>
            );
        }

        function Modal({ product, onClose }) {
            const phone = "380673485909";
            const msg = encodeURIComponent("Добрий день! Цікавить модель: " + product.name);
            const [currentImg, setCurrentImg] = useState(0);
            useEffect(() => { document.body.style.overflow = 'hidden'; return () => { document.body.style.overflow = 'unset'; }; }, []);

            return (
                <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4" onClick={onClose}>
                    <div className="bg-[#111] w-full max-w-5xl max-h-[90vh] rounded-[40px] overflow-hidden flex flex-col md:flex-row relative" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-6 right-6 z-10 w-10 h-10 bg-black/50 hover:bg-red-500 rounded-full text-white flex items-center justify-center transition-all">✕</button>
                        <div className="w-full md:w-3/5 h-[40vh] md:h-auto relative bg-black">
                            <img src={product.images[currentImg]} className="w-full h-full object-contain" />
                            <div className="absolute inset-0 flex items-center justify-between px-4">
                                <button onClick={() => setCurrentImg(prev => (prev === 0 ? product.images.length - 1 : prev - 1))} className="slider-btn w-12 h-12 rounded-full text-white flex items-center justify-center">❮</button>
                                <button onClick={() => setCurrentImg(prev => (prev === product.images.length - 1 ? 0 : prev + 1))} className="slider-btn w-12 h-12 rounded-full text-white flex items-center justify-center">❯</button>
                            </div>
                        </div>
                        <div className="w-full md:w-2/5 p-8 flex flex-col overflow-y-auto">
                            <h2 className="text-3xl font-bold mb-4">{product.name}</h2>
                            <div className="text-3xl font-extrabold text-blue-500 mb-8">{product.price} ₴</div>
                            <p className="text-gray-300 mb-8 leading-relaxed">{product.description}</p>
                            <div className="space-y-3 mt-auto">
                                <a href={`viber://chat?number=%2B${phone}&draft=${msg}`} className="w-full bg-[#7360f2] py-4 rounded-2xl font-bold flex items-center justify-center gap-2">Viber</a>
                                <a href={`https://wa.me/${phone}?text=${msg}`} className="w-full bg-[#25D366] py-4 rounded-2xl font-bold flex items-center justify-center gap-2 text-center">WhatsApp</a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const phone = "380673485909";
            const [products, setProducts] = useState(() => {
                const saved = localStorage.getItem('crozali_db');
                return saved ? JSON.parse(saved) : INITIAL_DATA;
            });
            const [filter, setFilter] = useState('all');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showAdd, setShowAdd] = useState(false);
            const [pass, setPass] = useState('');
            const [newP, setNewP] = useState({ name: '', price: '', img: '', gender: 'male', desc: '' });

            useEffect(() => { localStorage.setItem('crozali_db', JSON.stringify(products)); }, [products]);

            const deleteP = (id) => { if(confirm("Видалити товар?")) setProducts(products.filter(p => p.id !== id)); };

            const addP = (e) => {
                e.preventDefault();
                const item = { id: Date.now().toString(), name: newP.name, price: newP.price, images: [newP.img], gender: newP.gender, description: newP.desc };
                setProducts([item, ...products]);
                setShowAdd(false);
                setNewP({ name: '', price: '', img: '', gender: 'male', desc: '' });
            };

            const filtered = products.filter(p => filter === 'all' || p.gender === filter);

            return (
                <div className="min-h-screen">
                    <nav className="fixed top-0 w-full z-50 nav-blur h-20 flex items-center px-10 justify-between">
                        <span className="text-2xl font-black">CROZALI</span>
                        <div className="flex gap-4 items-center">
                            {isAdmin && <button onClick={() => setShowAdd(true)} className="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase shadow-lg shadow-blue-500/20 hover:bg-blue-500 transition">+ Додати товар</button>}
                            <div className="hidden md:flex gap-6 uppercase text-[10px] font-bold tracking-widest ml-4">
                                <a href="#catalog" className="hover:text-blue-500 transition">Каталог</a>
                                <a href="#about" className="hover:text-blue-500 transition">Про нас</a>
                                <a href="#contacts" className="hover:text-blue-500 transition">Контакти</a>
                            </div>
                        </div>
                    </nav>

                    <header className="pt-48 pb-20 px-6 text-center">
                        <h1 className="text-6xl md:text-8xl font-extrabold mb-6 gradient-text uppercase tracking-tighter">Step Into <br/> Future</h1>
                        <a href="#catalog" className="inline-block bg-blue-600 px-10 py-4 rounded-2xl font-extrabold uppercase tracking-widest text-sm shadow-2xl shadow-blue-500/30">Каталог</a>
                    </header>

                    <main id="catalog" className="py-20 px-6 max-w-6xl mx-auto">
                        <div className="flex flex-col items-center mb-16 gap-6">
                            <h2 className="text-4xl font-bold">Оберіть свій стиль</h2>
                            <div className="flex bg-[#111] p-1.5 rounded-2xl border border-white/5">
                                {['all', 'male', 'female'].map(t => (
                                    <button key={t} onClick={() => setFilter(t)} className={`px-8 py-2.5 rounded-xl text-sm font-bold transition ${filter === t ? 'bg-blue-600 text-white shadow-lg' : 'text-gray-500 hover:text-white'}`}>
                                        {t === 'all' ? 'Всі' : t === 'male' ? 'Чоловічі' : 'Жіночі'}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                            {filtered.map(p => <ProductCard key={p.id} product={p} isAdmin={isAdmin} onDelete={deleteP} onOpen={setSelectedProduct} />)}
                        </div>
                    </main>

                    {selectedProduct && <Modal product={selectedProduct} onClose={() => setSelectedProduct(null)} />}

                    <section id="about" className="py-24 bg-black/40 border-y border-white/5 backdrop-blur-sm">
                        <div className="max-w-4xl mx-auto px-6 text-center">
                            <h2 className="text-4xl font-bold mb-8 text-blue-500">Ми — Crozali</h2>
                            <div className="text-gray-300 space-y-6 text-lg leading-relaxed font-medium">
                                <p>Понад 8 років ми робимо нашим клієнтам шкіряне взуття, яке поєднує в собі стиль та комфорт.</p>
                                <p>Наша місія — зробити найкраще шкіряне взуття з гарантією якості. Також робимо взуття на замовлення.</p>
                            </div>
                        </div>
                    </section>

                    <footer id="contacts" className="py-24 px-6 max-w-6xl mx-auto text-white">
                        <div className="grid md:grid-cols-2 gap-16">
                            <div className="text-center md:text-left">
                                <h2 className="text-5xl font-bold mb-8">Маєш питання? <br/><span className="text-blue-500">Ми на зв'язку.</span></h2>
                                <div className="space-y-6">
                                    <a href={`tel:${phone}`} className="flex items-center justify-center md:justify-start gap-4 text-2xl font-bold hover:text-blue-500 transition tracking-tight">
                                        <span className="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center">📞</span>
                                        067 348 59 09
                                    </a>
                                    <div className="flex flex-wrap justify-center md:justify-start gap-3 pt-2">
                                        <a href="https://t.me/crozali" className="bg-white/5 p-3 rounded-xl hover:bg-blue-500 transition text-sm font-bold">Telegram</a>
                                        <a href="https://tiktok.com/@crozali" className="bg-white/5 p-3 rounded-xl hover:bg-white hover:text-black transition text-sm font-bold">TikTok</a>
                                        <a href={`viber://chat?number=%2B${phone}`} className="bg-white/5 p-3 rounded-xl hover:bg-purple-600 transition text-sm font-bold">Viber</a>
                                        <a href={`https://wa.me/${phone}`} className="bg-white/5 p-3 rounded-xl hover:bg-green-600 transition text-sm font-bold">WhatsApp</a>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-[#111] p-10 rounded-3xl border border-white/5 h-fit text-center shadow-xl">
                                <h3 className="text-xl font-bold mb-4">Графік роботи</h3>
                                <p className="text-gray-400">Пн-Пт: 10:00 — 18:00</p>
                                <p className="text-gray-400">Сб-Нд: 11:00 — 18:00</p>
                            </div>
                        </div>
                    </footer>

                    <button onClick={() => isAdmin ? setIsAdmin(false) : setShowLogin(true)} className="fixed bottom-6 right-6 z-50 bg-white/5 border border-white/10 p-4 rounded-2xl text-[10px] font-bold tracking-widest hover:bg-zinc-800 transition uppercase">
                        {isAdmin ? "Вихід" : "Адмін"}
                    </button>

                    {showLogin && (
                        <div className="fixed inset-0 bg-black/95 z-[120] flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-[#111] p-10 rounded-[40px] border border-blue-500/30 w-full max-w-xs text-center shadow-2xl">
                                <h3 className="text-blue-500 font-bold uppercase text-[10px] tracking-widest mb-6">Введіть пароль</h3>
                                <input type="password" autoFocus className="w-full p-4 rounded-2xl mb-4 text-center" value={pass} onChange={e => setPass(e.target.value)} />
                                <button onClick={() => { if(pass === "653160") { setIsAdmin(true); setShowLogin(false); setPass(''); } else alert('Error'); }} className="w-full bg-blue-600 py-4 rounded-2xl font-bold">УВІЙТИ</button>
                                <button onClick={() => setShowLogin(false)} className="mt-4 text-gray-600 text-[10px] uppercase font-bold">Закрити</button>
                            </div>
                        </div>
                    )}

                    {showAdd && (
                        <div className="fixed inset-0 bg-black/95 z-[130] flex items-center justify-center p-6 overflow-y-auto">
                            <form onSubmit={addP} className="bg-[#111] p-10 rounded-[40px] border border-white/5 w-full max-w-md relative">
                                <button onClick={() => setShowAdd(false)} className="absolute top-6 right-6 text-gray-500 hover:text-white">✕</button>
                                <h2 className="text-2xl font-bold mb-8 text-blue-500">Додати нову пару</h2>
                                <div className="space-y-4">
                                    <input required placeholder="Назва моделі" className="w-full p-4 rounded-2xl" value={newP.name} onChange={e => setNewP({...newP, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required type="number" placeholder="Ціна" className="w-full p-4 rounded-2xl" value={newP.price} onChange={e => setNewP({...newP, price: e.target.value})} />
                                        <select className="w-full p-4 rounded-2xl" value={newP.gender} onChange={e => setNewP({...newP, gender: e.target.value})}>
                                            <option value="male">Male</option>
                                            <option value="female">Female</option>
                                        </select>
                                    </div>
                                    <input required placeholder="Посилання на фото (URL)" className="w-full p-4 rounded-2xl" value={newP.img} onChange={e => setNewP({...newP, img: e.target.value})} />
                                    <textarea placeholder="Опис" className="w-full p-4 rounded-2xl h-24" value={newP.desc} onChange={e => setNewP({...newP, desc: e.target.value})}></textarea>
                                    <button type="submit" className="w-full bg-blue-600 py-5 rounded-3xl font-bold text-lg hover:bg-blue-500 transition">ОПУБЛІКУВАТИ</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
