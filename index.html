<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crozali | Преміальне взуття</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020202; color: white; scroll-behavior: smooth; overflow-x: hidden; }
        .chaos-bg { position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='150' height='150' viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='20' fill='rgba(255,255,255,0.05)' font-size='10'%3E+%3C/text%3E%3C/svg%3E"); z-index: -1; }
        .nav-blur { background: rgba(2, 2, 2, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .product-card { background: rgba(17, 17, 17, 0.85); border: 1px solid #222; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .product-card:hover { border-color: #3b82f6; transform: translateY(-5px); box-shadow: 0 20px 40px rgba(59, 130, 246, 0.1); }
        .slider-btn { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); transition: 0.3s; z-index: 20; }
        .slider-btn:hover { background: #3b82f6; }
        .indicator-dot { height: 4px; border-radius: 2px; transition: all 0.3s ease; background: rgba(255,255,255,0.3); }
        .indicator-active { width: 24px; background: #3b82f6; }
        .indicator-inactive { width: 6px; }
        .gradient-text { background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-overlay { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input, textarea, select { background: #111 !important; border: 1px solid #333 !important; color: white !important; outline: none; padding: 12px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="chaos-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Конфігурація Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBSmzapB-gtDeQNVq-m7GuJP0XF2_94aU",
            authDomain: "crozali-shop.firebaseapp.com",
            projectId: "crozali-shop",
            storageBucket: "crozali-shop.firebasestorage.app",
            messagingSenderId: "50262512045",
            appId: "1:50262512045:web:a996b63a47480abd941124",
            measurementId: "G-DR6LXXC6QX"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function ProductCard({ product, onOpen, isAdmin, onDelete }) {
            const [currentImg, setCurrentImg] = useState(0);
            const next = (e) => { e.stopPropagation(); setCurrentImg(prev => (prev === product.images.length - 1 ? 0 : prev + 1)); };
            const prev = (e) => { e.stopPropagation(); setCurrentImg(prev => (prev === 0 ? product.images.length - 1 : prev - 1)); };

            return (
                <div onClick={() => onOpen(product)} className="product-card rounded-3xl overflow-hidden flex flex-col h-full group">
                    {isAdmin && (
                        <button onClick={(e) => { e.stopPropagation(); onDelete(product.id); }} className="absolute top-4 right-4 z-30 bg-red-600 w-10 h-10 rounded-full flex items-center justify-center text-white hover:scale-110 transition shadow-xl">✕</button>
                    )}
                    <div className="relative h-72 overflow-hidden bg-black/40">
                        <img src={product.images[currentImg]} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                        {product.images.length > 1 && (
                            <div className="absolute inset-0 flex items-center justify-between px-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onClick={prev} className="slider-btn w-10 h-10 rounded-full text-white flex items-center justify-center">❮</button>
                                <button onClick={next} className="slider-btn w-10 h-10 rounded-full text-white flex items-center justify-center">❯</button>
                            </div>
                        )}
                        <div className="absolute bottom-4 left-0 right-0 flex justify-center gap-1.5 pointer-events-none">
                            {product.images.map((_, idx) => (
                                <div key={idx} className={`indicator-dot ${idx === currentImg ? 'indicator-active' : 'indicator-inactive'}`}></div>
                            ))}
                        </div>
                    </div>
                    <div className="p-6 flex flex-col flex-grow">
                        <h3 className="text-xl font-bold mb-2">{product.name}</h3>
                        <p className="text-gray-400 text-sm mb-6 flex-grow line-clamp-2">{product.description}</p>
                        <div className="flex justify-between items-center">
                            <span className="text-2xl font-extrabold text-blue-500">{product.price} ₴</span>
                            <span className="text-blue-400 text-sm font-bold underline">Детальніше</span>
                        </div>
                    </div>
                </div>
            );
        }

        function Modal({ product, onClose }) {
            const [currentImg, setCurrentImg] = useState(0);
            const phone = "380673485909";
            const msg = encodeURIComponent("Добрий день! Цікавить модель: " + product.name);

            return (
                <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4 md:p-8" onClick={onClose}>
                    <div className="bg-[#111] w-full max-w-5xl max-h-[90vh] rounded-3xl overflow-hidden flex flex-col md:flex-row relative shadow-2xl" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-4 right-4 z-10 w-12 h-12 bg-black/50 hover:bg-red-500 rounded-full text-white text-2xl flex items-center justify-center transition-colors">✕</button>
                        <div className="w-full md:w-3/5 h-[40vh] md:h-auto relative bg-black">
                            <img src={product.images[currentImg]} className="w-full h-full object-contain" />
                            {product.images.length > 1 && (
                                <div className="absolute inset-0 flex items-center justify-between px-4">
                                    <button onClick={() => setCurrentImg(prev => (prev === 0 ? product.images.length - 1 : prev - 1))} className="slider-btn w-12 h-12 rounded-full text-white flex items-center justify-center">❮</button>
                                    <button onClick={() => setCurrentImg(prev => (prev === product.images.length - 1 ? 0 : prev + 1))} className="slider-btn w-12 h-12 rounded-full text-white flex items-center justify-center">❯</button>
                                </div>
                            )}
                        </div>
                        <div className="w-full md:w-2/5 p-8 flex flex-col overflow-y-auto">
                            <h2 className="text-3xl font-bold mb-4">{product.name}</h2>
                            <div className="text-3xl font-extrabold text-blue-500 mb-6">{product.price} ₴</div>
                            <p className="text-gray-300 leading-relaxed text-lg mb-8">{product.description}</p>
                            <div className="space-y-3 mt-auto">
                                <a href={`viber://chat?number=%2B${phone}&draft=${msg}`} className="w-full bg-[#7360f2] text-white py-4 rounded-2xl font-bold text-center block">💜 Viber</a>
                                <a href={`https://wa.me/${phone}?text=${msg}`} className="w-full bg-[#25D366] text-white py-4 rounded-2xl font-bold text-center block">🟢 WhatsApp</a>
                                <a href={`tel:${phone}`} className="w-full bg-white text-black py-4 rounded-2xl font-bold text-center block">📞 Подзвонити</a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [products, setProducts] = useState([]);
            const [filter, setFilter] = useState('all');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showAdd, setShowAdd] = useState(false);
            const [pass, setPass] = useState('');
            const [newItem, setNewItem] = useState({ name: '', price: '', desc: '', img1: '', img2: '', img3: '', gender: 'male' });
            const phone = "380673485909";

            useEffect(() => {
                const ref = db.ref('products');
                ref.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                        setProducts(list);
                    }
                });
                return () => ref.off();
            }, []);

            const handleLogin = () => {
                if (pass === '653160') { setIsAdmin(true); setShowLogin(false); setPass(''); }
                else { alert('Невірний пароль!'); }
            };

            const addProduct = () => {
                const data = {
                    name: newItem.name,
                    price: Number(newItem.price),
                    gender: newItem.gender,
                    description: newItem.desc,
                    images: [newItem.img1, newItem.img2, newItem.img3].filter(i => i)
                };
                db.ref('products').push(data);
                setShowAdd(false);
                setNewItem({ name: '', price: '', desc: '', img1: '', img2: '', img3: '', gender: 'male' });
            };

            const filtered = products.filter(p => filter === 'all' || p.gender === filter);

            return (
                <div className="min-h-screen">
                    <nav className="fixed top-0 w-full z-50 nav-blur">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
                            <span className="text-2xl font-extrabold tracking-tighter">CROZALI</span>
                            <div className="flex items-center gap-6">
                                {isAdmin && <button onClick={() => setShowAdd(true)} className="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold uppercase">+ Додати</button>}
                                <div className="hidden md:flex gap-8 text-sm font-bold uppercase tracking-widest">
                                    <a href="#catalog" className="hover:text-blue-500 transition">Каталог</a>
                                    <a href="#contacts" className="hover:text-blue-500 transition">Контакти</a>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <section className="pt-48 pb-24 px-6 text-center">
                        <h1 className="text-6xl md:text-8xl font-extrabold mb-6 gradient-text tracking-tighter uppercase leading-tight">Step Into <br/> Future</h1>
                        <p className="text-gray-400 text-xl max-w-2xl mx-auto mb-10 italic">"Найкращий спосіб передбачити майбутнє — створити його власним кроком."</p>
                        <a href="#catalog" className="inline-block bg-blue-600 px-10 py-4 rounded-2xl font-extrabold hover:bg-blue-700 transition shadow-2xl shadow-blue-500/20 uppercase tracking-widest text-sm">ПЕРЕГЛЯНУТИ КАТАЛОГ</a>
                    </section>

                    <section id="catalog" className="py-24 px-6 max-w-6xl mx-auto">
                        <div className="flex flex-col items-center mb-16 gap-8">
                            <div className="flex bg-[#111] p-1.5 rounded-2xl border border-white/5">
                                {['all', 'male', 'female'].map(type => (
                                    <button key={type} onClick={() => setFilter(type)} className={`px-8 py-2.5 rounded-xl text-sm font-bold transition ${filter === type ? 'bg-blue-600 text-white' : 'text-gray-400'}`}>
                                        {type === 'all' ? 'Всі' : type === 'male' ? 'Чоловічі' : 'Жіночі'}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                            {filtered.map(p => <ProductCard key={p.id} product={p} isAdmin={isAdmin} onDelete={(id) => db.ref(`products/${id}`).remove()} onOpen={setSelectedProduct} />)}
                        </div>
                    </section>

                    <footer id="contacts" className="py-24 px-6 max-w-6xl mx-auto border-t border-white/5">
                        <div className="grid md:grid-cols-2 gap-16">
                            <div className="text-center md:text-left">
                                <h2 className="text-5xl font-bold mb-8">Маєш питання? <br/><span className="text-blue-500">Ми на зв'язку.</span></h2>
                                <div className="space-y-6">
                                    <a href={`tel:${phone}`} className="flex items-center justify-center md:justify-start gap-4 text-2xl font-bold hover:text-blue-500 transition">
                                        <span className="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center">📞</span>
                                        067 348 59 09
                                    </a>
                                    <div className="flex justify-center md:justify-start gap-4 pt-4">
                                        <a href="https://viber.click/380673485909" className="w-12 h-12 bg-[#7360f2]/10 rounded-full flex items-center justify-center hover:bg-[#7360f2] transition font-bold text-xl">V</a>
                                        <a href="https://wa.me/380673485909" className="w-12 h-12 bg-[#25D366]/10 rounded-full flex items-center justify-center hover:bg-[#25D366] transition font-bold text-xl">W</a>
                                        <a href="https://t.me/crozali" className="w-12 h-12 bg-[#0088cc]/10 rounded-full flex items-center justify-center hover:bg-[#0088cc] transition font-bold text-xl">T</a>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-[#111] p-10 rounded-3xl border border-white/5 text-center">
                                <h3 className="text-xl font-bold mb-4">Графік роботи</h3>
                                <p className="text-gray-400">Пн-Пт: 10:00 — 18:00</p>
                                <p className="text-gray-400">Сб-Нд: 11:00 — 18:00</p>
                            </div>
                        </div>
                    </footer>

                    <button onClick={() => isAdmin ? setIsAdmin(false) : setShowLogin(true)} className="fixed bottom-6 right-6 z-50 bg-[#111] border border-white/10 p-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest">
                        {isAdmin ? "ВИХІД" : "АДМІН"}
                    </button>

                    {showLogin && (
                        <div className="fixed inset-0 bg-black/95 z-[150] flex items-center justify-center p-6">
                            <div className="bg-[#111] p-10 rounded-[40px] border border-blue-500/30 w-full max-w-xs">
                                <input type="password" autoFocus className="w-full mb-4 text-center" onChange={e => setPass(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} />
                                <button onClick={handleLogin} className="w-full bg-blue-600 py-4 rounded-2xl font-bold">УВІЙТИ</button>
                            </div>
                        </div>
                    )}

                    {showAdd && (
                        <div className="fixed inset-0 bg-black/95 z-[150] flex items-center justify-center p-6 overflow-y-auto">
                            <div className="bg-[#111] p-8 rounded-3xl border border-white/10 w-full max-w-lg space-y-4">
                                <h2 className="text-2xl font-bold mb-6 text-center text-blue-500 uppercase">Нова пара</h2>
                                <input placeholder="Назва" className="w-full" onChange={e => setNewItem({...newItem, name: e.target.value})} />
                                <input placeholder="Ціна" type="number" className="w-full" onChange={e => setNewItem({...newItem, price: e.target.value})} />
                                <select className="w-full" onChange={e => setNewItem({...newItem, gender: e.target.value})}>
                                    <option value="male">Чоловічі</option>
                                    <option value="female">Жіночі</option>
                                </select>
                                <textarea placeholder="Опис" className="w-full h-24" onChange={e => setNewItem({...newItem, desc: e.target.value})} />
                                <input placeholder="Фото 1" className="w-full" onChange={e => setNewItem({...newItem, img1: e.target.value})} />
                                <input placeholder="Фото 2" className="w-full" onChange={e => setNewItem({...newItem, img2: e.target.value})} />
                                <div className="flex gap-4 pt-4">
                                    <button onClick={addProduct} className="flex-1 bg-blue-600 py-4 rounded-2xl font-bold">ЗБЕРЕГТИ</button>
                                    <button onClick={() => setShowAdd(false)} className="flex-1 bg-zinc-800 py-4 rounded-2xl font-bold">СКАСУВАТИ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedProduct && <Modal product={selectedProduct} onClose={() => setSelectedProduct(null)} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
