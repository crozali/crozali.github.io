<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crozali | Admin Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020202; color: white; }
        .nav-blur { background: rgba(2, 2, 2, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .product-card { background: rgba(17, 17, 17, 0.85); border: 1px solid #222; position: relative; transition: 0.3s; }
        .admin-panel-active { border: 1px dashed #3b82f6; animation: pulse border 2s infinite; }
        @keyframes pulse { 0% { border-color: #3b82f6; } 50% { border-color: #1d4ed8; } 100% { border-color: #3b82f6; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const INITIAL_DATA = [
            { id: 1, name: 'Чоловічі Монкі', gender: 'male', price: 3000, images: ['https://i.ibb.co/rWJwTzn/2026-03-17-154838389.png'], description: 'Класика.' },
            { id: 2, name: 'Жіноча класика', gender: 'female', price: 2500, images: ['https://i.ibb.co/qYB5xSy5/image.png'], description: 'Масивна підошва.' },
            { id: 3, name: 'Туфлі жіночі чорні', gender: 'female', price: 2800, images: ['https://i.ibb.co/rfNTYj7b/image.png'], description: 'Натур шкіра.' },
            { id: 4, name: 'Жіночі туфлі коричневі', gender: 'female', price: 2800, images: ['https://i.ibb.co/ZRbL14xg/image.png'], description: 'Шевро.' },
            { id: 5, name: 'Жіночі туфлі сірі', gender: 'female', price: 2800, images: ['https://i.ibb.co/vCMqnm4f/image.png'], description: 'Елегантність.' },
            { id: 6, name: 'Туфлі жіночі бузкові', gender: 'female', price: 2800, images: ['https://i.ibb.co/9k1mMyFr/image.png'], description: 'Бузковий колір.' },
            { id: 7, name: 'Чоловічі кеди', gender: 'male', price: 2450, images: ['https://i.ibb.co/cX6qww3h/image.png'], description: 'Нубук.' },
            { id: 8, name: 'Чоловічі туфлі', gender: 'male', price: 2100, images: ['https://i.ibb.co/v4h5sVmx/image.png'], description: 'Класика чорна.' }
        ];

        function App() {
            const [products, setProducts] = useState(INITIAL_DATA);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [pass, setPass] = useState('');

            // Функції Адміна
            const deleteProduct = (id) => {
                if(confirm("Видалити цей товар з вітрини?")) {
                    setProducts(products.filter(p => p.id !== id));
                }
            };

            const editPrice = (id) => {
                const p = prompt("Введіть нову ціну (тільки цифри):");
                if (p) setProducts(products.map(item => item.id === id ? {...item, price: p} : item));
            };

            const addProduct = () => {
                const name = prompt("Назва взуття:");
                const price = prompt("Ціна:");
                const img = prompt("Посилання на фото (URL):", "https://i.ibb.co/...");
                if (name && price && img) {
                    const newProd = { id: Date.now(), name, price, images: [img], gender: 'male', description: 'Нова модель' };
                    setProducts([newProd, ...products]);
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    <nav className="fixed top-0 w-full z-50 nav-blur h-20 flex items-center justify-between px-10">
                        <span className="text-2xl font-black tracking-tighter">CROZALI</span>
                        {isAdmin && (
                            <div className="bg-blue-600 px-4 py-2 rounded-full flex items-center gap-4 animate-pulse">
                                <span className="text-[10px] font-bold uppercase">Admin Active</span>
                                <button onClick={addProduct} className="bg-white text-blue-600 px-3 py-1 rounded-lg font-bold text-xs hover:scale-105 transition"> + ДОДАТИ ТОВАР</button>
                            </div>
                        )}
                    </nav>

                    <div className="pt-32 max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8">
                        {products.map(p => (
                            <div key={p.id} className={`product-card rounded-3xl overflow-hidden p-4 ${isAdmin ? 'admin-panel-active' : ''}`}>
                                
                                {/* КНОПКИ КЕРУВАННЯ (Тільки для адміна) */}
                                {isAdmin && (
                                    <div className="absolute top-6 right-6 z-10 flex gap-2">
                                        <button onClick={() => editPrice(p.id)} title="Змінити ціну" className="bg-blue-500 w-8 h-8 rounded-full flex items-center justify-center text-sm shadow-xl hover:bg-blue-400">✎</button>
                                        <button onClick={() => deleteProduct(p.id)} title="Видалити" className="bg-red-600 w-8 h-8 rounded-full flex items-center justify-center text-sm shadow-xl hover:bg-red-500">✕</button>
                                    </div>
                                )}

                                <img src={p.images[0]} className="w-full h-64 object-cover rounded-2xl mb-4 bg-zinc-900" />
                                <h3 className="font-bold text-lg mb-1">{p.name}</h3>
                                <div className="flex justify-between items-center">
                                    <p className="text-blue-500 font-black text-xl">{p.price} ₴</p>
                                    <span className="text-[10px] text-gray-500 uppercase font-bold tracking-widest">{p.gender}</span>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Кнопка входу */}
                    <button onClick={() => isAdmin ? setIsAdmin(false) : setShowLogin(true)} className="fixed bottom-6 right-6 z-50 bg-zinc-900 border border-white/10 px-4 py-3 rounded-2xl text-[10px] font-bold hover:bg-zinc-800 transition">
                        {isAdmin ? "ВИЙТИ З АДМІНКИ" : "🔑 УВІЙТИ ЯК АДМІН"}
                    </button>

                    {/* Модалка пароля */}
                    {showLogin && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] backdrop-blur-sm">
                            <div className="bg-zinc-900 p-8 rounded-[40px] border border-blue-500/30 w-80 text-center">
                                <h3 className="text-blue-500 font-bold uppercase text-xs tracking-[0.2em] mb-6">Доступ обмежено</h3>
                                <input 
                                    type="password" 
                                    placeholder="Пароль..." 
                                    className="w-full bg-black border border-white/10 p-4 rounded-2xl mb-4 outline-none focus:border-blue-500 text-center"
                                    value={pass}
                                    onChange={e => setPass(e.target.value)}
                                    autoFocus
                                />
                                <button onClick={() => { if(pass === "1234") { setIsAdmin(true); setShowLogin(false); setPass(''); } else alert('Wrong!') }} className="w-full bg-blue-600 py-4 rounded-2xl font-bold hover:bg-blue-500 transition">УВІЙТИ</button>
                                <button onClick={() => setShowLogin(false)} className="mt-4 text-zinc-500 text-[10px] uppercase font-bold">Закрити</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
