<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crozali | Premium Store & Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020202; color: white; scroll-behavior: smooth; }
        .nav-blur { background: rgba(2, 2, 2, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .product-card { background: rgba(17, 17, 17, 0.85); border: 1px solid #222; transition: 0.4s; position: relative; }
        .admin-glow { border: 1px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .indicator-dot { height: 4px; border-radius: 2px; transition: 0.3s; background: rgba(255,255,255,0.2); }
        .indicator-active { width: 24px; background: #3b82f6; }
        input, select, textarea { background: #000 !important; border: 1px solid #333 !important; color: white !important; }
        input:focus { border-color: #3b82f6 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DEFAULT_PRODUCTS = [
            { id: 1, name: 'Чоловічі Монкі', gender: 'male', price: 3000, images: ['https://i.ibb.co/rWJwTzn/2026-03-17-154838389.png'], description: 'Класика.' },
            { id: 2, name: 'Жіноча класика', gender: 'female', price: 2500, images: ['https://i.ibb.co/qYB5xSy5/image.png'], description: 'Масивна підошва.' },
            { id: 3, name: 'Туфлі жіночі чорні', gender: 'female', price: 2800, images: ['https://i.ibb.co/rfNTYj7b/image.png'], description: 'Натур шкіра.' },
            { id: 4, name: 'Жіночі туфлі коричневі', gender: 'female', price: 2800, images: ['https://i.ibb.co/ZRbL14xg/image.png'], description: 'Шевро.' },
            { id: 5, name: 'Жіночі туфлі сірі', gender: 'female', price: 2800, images: ['https://i.ibb.co/vCMqnm4f/image.png'], description: 'Елегантність.' },
            { id: 6, name: 'Туфлі жіночі бузкові', gender: 'female', price: 2800, images: ['https://i.ibb.co/9k1mMyFr/image.png'], description: 'Бузковий колір.' },
            { id: 7, name: 'Чоловічі кеди', gender: 'male', price: 2450, images: ['https://i.ibb.co/cX6qww3h/image.png'], description: 'Нубук.' },
            { id: 8, name: 'Чоловічі туфлі', gender: 'male', price: 2100, images: ['https://i.ibb.co/v4h5sVmx/image.png'], description: 'Класика чорна.' }
        ];

        function App() {
            // Завантаження даних з пам'яті браузера або дефолтні
            const [products, setProducts] = useState(() => {
                const saved = localStorage.getItem('crozali_products');
                return saved ? JSON.parse(saved) : DEFAULT_PRODUCTS;
            });

            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showAddForm, setShowAddForm] = useState(false);
            const [pass, setPass] = useState('');
            const [filter, setFilter] = useState('all');

            // Нова форма товару
            const [newP, setNewP] = useState({ name: '', price: '', img: '', gender: 'male', desc: '' });

            // Збереження в пам'ять при кожній зміні
            useEffect(() => {
                localStorage.setItem('crozali_products', JSON.stringify(products));
            }, [products]);

            const deleteProduct = (id) => {
                if(confirm("Видалити цей товар назавжди?")) {
                    setProducts(products.filter(p => p.id !== id));
                }
            };

            const handleAddProduct = (e) => {
                e.preventDefault();
                const item = {
                    id: Date.now(),
                    name: newP.name,
                    price: parseInt(newP.price),
                    images: [newP.img || 'https://via.placeholder.com/400'],
                    gender: newP.gender,
                    description: newP.desc
                };
                setProducts([item, ...products]);
                setShowAddForm(false);
                setNewP({ name: '', price: '', img: '', gender: 'male', desc: '' });
            };

            const filtered = products.filter(p => filter === 'all' || p.gender === filter);

            return (
                <div className="min-h-screen pb-20">
                    {/* Навігація */}
                    <nav className="fixed top-0 w-full z-50 nav-blur h-20 flex items-center justify-between px-6 md:px-20">
                        <span className="text-2xl font-black tracking-tighter">CROZALI</span>
                        <div className="flex gap-6 items-center">
                            <div className="hidden md:flex gap-4">
                                {['all', 'male', 'female'].map(t => (
                                    <button key={t} onClick={() => setFilter(t)} className={`text-[10px] font-bold uppercase tracking-widest ${filter === t ? 'text-blue-500' : 'text-gray-400'}`}>
                                        {t === 'all' ? 'Всі' : t === 'male' ? 'Чоловічі' : 'Жіночі'}
                                    </button>
                                ))}
                            </div>
                            {isAdmin && (
                                <button onClick={() => setShowAddForm(true)} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">
                                    + Додати товар
                                </button>
                            )}
                        </div>
                    </nav>

                    {/* Каталог */}
                    <div className="pt-32 max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8">
                        {filtered.map(p => (
                            <div key={p.id} className={`product-card rounded-[32px] overflow-hidden p-4 ${isAdmin ? 'admin-glow' : ''}`}>
                                {isAdmin && (
                                    <button onClick={() => deleteProduct(p.id)} className="absolute top-6 right-6 z-10 bg-red-600/80 hover:bg-red-600 w-8 h-8 rounded-full flex items-center justify-center text-xs">✕</button>
                                )}
                                <div className="h-64 rounded-2xl overflow-hidden mb-4 bg-zinc-900">
                                    <img src={p.images[0]} className="w-full h-full object-cover" />
                                </div>
                                <h3 className="font-bold text-lg mb-1">{p.name}</h3>
                                <div className="flex justify-between items-center">
                                    <p className="text-blue-500 font-black text-xl">{p.price} ₴</p>
                                    <span className="text-[9px] bg-white/5 px-2 py-1 rounded text-gray-400 uppercase font-bold tracking-widest">{p.gender}</span>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Кнопка Адміна */}
                    <button onClick={() => isAdmin ? setIsAdmin(false) : setShowLogin(true)} className="fixed bottom-6 right-6 z-50 bg-zinc-900/80 backdrop-blur border border-white/10 px-5 py-3 rounded-2xl text-[10px] font-bold hover:bg-zinc-800 transition">
                        {isAdmin ? "ВИЙТИ З АДМІНКИ" : "🔑 АДМІН"}
                    </button>

                    {/* Модалка входу */}
                    {showLogin && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] backdrop-blur-md">
                            <div className="bg-zinc-900 p-8 rounded-[40px] border border-blue-500/30 w-80 text-center">
                                <h3 className="text-blue-500 font-bold uppercase text-xs tracking-widest mb-6">Вхід в адмін-панель</h3>
                                <input type="password" placeholder="Пароль..." className="w-full p-4 rounded-2xl mb-4 text-center outline-none" value={pass} onChange={e => setPass(e.target.value)} autoFocus />
                                <button onClick={() => { if(pass === "1234") { setIsAdmin(true); setShowLogin(false); setPass(''); } else alert('Невірно!') }} className="w-full bg-blue-600 py-4 rounded-2xl font-bold">УВІЙТИ</button>
                                <button onClick={() => setShowLogin(false)} className="mt-4 text-zinc-500 text-[10px] uppercase font-bold">Закрити</button>
                            </div>
                        </div>
                    )}

                    {/* ФОРМА ДОДАВАННЯ ТОВАРУ */}
                    {showAddForm && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center z-[110] p-4 overflow-y-auto">
                            <div className="bg-zinc-900 w-full max-w-md p-8 rounded-[40px] border border-white/10 relative">
                                <button onClick={() => setShowAddForm(false)} className="absolute top-6 right-6 text-gray-500 hover:text-white">✕</button>
                                <h2 className="text-2xl font-bold mb-6 text-blue-500">Нова пара взуття</h2>
                                <form onSubmit={handleAddProduct} className="space-y-4">
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-gray-500 ml-2">Назва моделі</label>
                                        <input required className="w-full p-4 rounded-2xl mt-1 outline-none" placeholder="Напр: Кеди Crozali White" value={newP.name} onChange={e => setNewP({...newP, name: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-500 ml-2">Ціна (₴)</label>
                                            <input required type="number" className="w-full p-4 rounded-2xl mt-1 outline-none" placeholder="2800" value={newP.price} onChange={e => setNewP({...newP, price: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-500 ml-2">Для кого</label>
                                            <select className="w-full p-4 rounded-2xl mt-1 outline-none appearance-none" value={newP.gender} onChange={e => setNewP({...newP, gender: e.target.value})}>
                                                <option value="male">Чоловікам</option>
                                                <option value="female">Жінкам</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-gray-500 ml-2">Посилання на фото</label>
                                        <input required className="w-full p-4 rounded-2xl mt-1 outline-none" placeholder="https://i.ibb.co/..." value={newP.img} onChange={e => setNewP({...newP, img: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-gray-500 ml-2">Опис (необов'язково)</label>
                                        <textarea className="w-full p-4 rounded-2xl mt-1 outline-none h-24" placeholder="Натуральна шкіра..." value={newP.desc} onChange={e => setNewP({...newP, desc: e.target.value})}></textarea>
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 py-5 rounded-[24px] font-bold text-lg hover:bg-blue-500 transition mt-4">ОПУБЛІКУВАТИ</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
