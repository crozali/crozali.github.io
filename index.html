<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crozali | Магазин преміального взуття</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020202; color: white; scroll-behavior: smooth; position: relative; overflow-x: hidden; }
        .chaos-bg { position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='150' height='150' viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='20' fill='rgba(255,255,255,0.18)' font-family='monospace' font-size='10'%3E+%3C/text%3E%3C/svg%3E"); pointer-events: none; z-index: -1; }
        .nav-blur { background: rgba(2, 2, 2, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .product-card { background: rgba(17, 17, 17, 0.85); border: 1px solid #222; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; backdrop-filter: blur(4px); }
        .product-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
        .slider-btn { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); transition: 0.3s; }
        .slider-btn:hover { background: #3b82f6; }
        .indicator-dot { height: 4px; border-radius: 2px; transition: all 0.3s ease; background: rgba(255,255,255,0.3); }
        .indicator-active { width: 24px; background: #3b82f6; }
        .indicator-inactive { width: 6px; }
        .gradient-text { background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input, textarea, select { background: #111 !important; border: 1px solid #333 !important; color: white !important; padding: 12px; border-radius: 12px; width: 100%; }
    </style>
</head>
<body>
    <div class="chaos-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBSmzapB-gtDeQNVq-m7GuJP0XF2_94aU",
            authDomain: "crozali-shop.firebaseapp.com",
            projectId: "crozali-shop",
            storageBucket: "crozali-shop.firebasestorage.app",
            messagingSenderId: "50262512045",
            appId: "1:50262512045:web:a996b63a47480abd941124"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function ProductCard({ product, onOpen, isAdmin, onDelete }) {
            const [currentImg, setCurrentImg] = useState(0);
            const next = (e) => { e.stopPropagation(); setCurrentImg(prev => (prev === product.images.length - 1 ? 0 : prev + 1)); };
            const prev = (e) => { e.stopPropagation(); setCurrentImg(prev => (prev === 0 ? product.images.length - 1 : prev - 1)); };

            return (
                <div onClick={() => onOpen(product)} className="product-card rounded-3xl overflow-hidden flex flex-col h-full group relative">
                    {isAdmin && <button onClick={(e) => { e.stopPropagation(); onDelete(product.id); }} className="absolute top-4 right-4 z-50 bg-red-600 w-8 h-8 rounded-full">✕</button>}
                    <div className="relative h-72 overflow-hidden bg-black/40">
                        <img src={product.images[currentImg]} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                        <div className="absolute inset-0 flex items-center justify-between px-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={prev} className="slider-btn w-10 h-10 rounded-full text-white flex items-center justify-center">❮</button>
                            <button onClick={next} className="slider-btn w-10 h-10 rounded-full text-white flex items-center justify-center">❯</button>
                        </div>
                        <div className="absolute bottom-4 left-0 right-0 flex justify-center gap-1.5">
                            {product.images.map((_, idx) => (
                                <div key={idx} className={`indicator-dot ${idx === currentImg ? 'indicator-active' : 'indicator-inactive'}`}></div>
                            ))}
                        </div>
                    </div>
                    <div className="p-6 flex flex-col flex-grow">
                        <h3 className="text-xl font-bold mb-2">{product.name}</h3>
                        <p className="text-gray-400 text-sm mb-6 line-clamp-2">{product.description}</p>
                        <div className="flex justify-between items-center mt-auto">
                            <span className="text-2xl font-extrabold text-blue-500">{product.price} ₴</span>
                            <span className="text-blue-400 text-sm font-bold underline">Детальніше</span>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [products, setProducts] = useState([]);
            const [filter, setFilter] = useState('all');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showAdd, setShowAdd] = useState(false);
            const [pass, setPass] = useState('');
            const [newItem, setNewItem] = useState({ name: '', price: '', desc: '', img1: '', img2: '', img3: '', gender: 'male' });

            useEffect(() => {
                const ref = db.ref('products');
                ref.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setProducts(Object.keys(data).map(key => ({ id: key, ...data[key] })));
                    } else { setProducts([]); }
                });
            }, []);

            const addProduct = () => {
                const imgs = [newItem.img1, newItem.img2, newItem.img3].filter(i => i);
                db.ref('products').push({ ...newItem, images: imgs, price: Number(newItem.price) });
                setShowAdd(false);
                setNewItem({ name: '', price: '', desc: '', img1: '', img2: '', img3: '', gender: 'male' });
            };

            const filtered = products.filter(p => filter === 'all' || p.gender === filter);

            return (
                <div className="min-h-screen">
                    <nav className="fixed top-0 w-full z-50 nav-blur h-20 flex items-center justify-between px-6">
                        <span className="text-2xl font-extrabold tracking-tighter">CROZALI</span>
                        <div className="flex gap-6 text-sm font-bold uppercase tracking-widest">
                            <a href="#catalog">Каталог</a>
                            <a href="#about">Про нас</a>
                            {isAdmin && <button onClick={() => setShowAdd(true)} className="text-blue-500">+ ДОДАТИ</button>}
                        </div>
                    </nav>

                    <section className="pt-48 pb-24 text-center px-6">
                        <h1 className="text-6xl md:text-8xl font-extrabold mb-6 gradient-text tracking-tighter uppercase">Step Into <br/> Future</h1>
                        <a href="#catalog" className="inline-block bg-blue-600 px-10 py-4 rounded-2xl font-extrabold">КАТАЛОГ</a>
                    </section>

                    <section id="catalog" className="py-24 px-6 max-w-6xl mx-auto">
                        <div className="flex flex-col items-center mb-16 gap-8">
                            <div className="flex bg-[#111] p-1.5 rounded-2xl border border-white/5">
                                {['all', 'male', 'female'].map(type => (
                                    <button key={type} onClick={() => setFilter(type)} className={`px-8 py-2.5 rounded-xl text-sm font-bold ${filter === type ? 'bg-blue-600' : 'text-gray-400'}`}>
                                        {type === 'all' ? 'Всі' : type === 'male' ? 'Чоловічі' : 'Жіночі'}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                            {filtered.map(p => <ProductCard key={p.id} product={p} isAdmin={isAdmin} onDelete={(id) => db.ref(`products/${id}`).remove()} onOpen={setSelectedProduct} />)}
                        </div>
                    </section>

                    {showLogin && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/90 p-4">
                            <div className="bg-[#111] p-8 rounded-3xl w-full max-w-xs border border-blue-500">
                                <input type="password" placeholder="Пароль" className="mb-4 text-center" onChange={e => setPass(e.target.value)} />
                                <button onClick={() => pass === '653160' ? (setIsAdmin(true), setShowLogin(false)) : alert('Ні')} className="w-full bg-blue-600 py-3 rounded-xl font-bold">УВІЙТИ</button>
                            </div>
                        </div>
                    )}

                    {showAdd && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/95 p-6 overflow-y-auto">
                            <div className="bg-[#111] p-8 rounded-3xl w-full max-w-md space-y-4 border border-white/10">
                                <h2 className="text-2xl font-bold text-center text-blue-500">НОВА МОДЕЛЬ</h2>
                                <input placeholder="Назва" onChange={e => setNewItem({...newItem, name: e.target.value})} />
                                <input placeholder="Ціна" type="number" onChange={e => setNewItem({...newItem, price: e.target.value})} />
                                <textarea placeholder="Опис" onChange={e => setNewItem({...newItem, desc: e.target.value})} />
                                <input placeholder="URL Фото 1" onChange={e => setNewItem({...newItem, img1: e.target.value})} />
                                <input placeholder="URL Фото 2" onChange={e => setNewItem({...newItem, img2: e.target.value})} />
                                <input placeholder="URL Фото 3" onChange={e => setNewItem({...newItem, img3: e.target.value})} />
                                <select onChange={e => setNewItem({...newItem, gender: e.target.value})}>
                                    <option value="male">Чоловіче</option>
                                    <option value="female">Жіноче</option>
                                </select>
                                <div className="flex gap-4">
                                    <button onClick={addProduct} className="flex-1 bg-blue-600 py-4 rounded-xl font-bold">ЗБЕРЕГТИ</button>
                                    <button onClick={() => setShowAdd(false)} className="flex-1 bg-zinc-800 py-4 rounded-xl font-bold">СКАСУВАТИ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <button onClick={() => isAdmin ? setIsAdmin(false) : setShowLogin(true)} className="fixed bottom-6 right-6 z-50 bg-[#111] p-4 rounded-2xl border border-white/10 text-[10px] font-bold uppercase tracking-widest">{isAdmin ? 'Вихід' : 'Адмін'}</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
