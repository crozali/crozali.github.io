<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crozali | Магазин преміального взуття</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020202; color: white; scroll-behavior: smooth; position: relative; overflow-x: hidden; }
        .chaos-bg { position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='150' height='150' viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='20' fill='rgba(255,255,255,0.18)' font-family='monospace' font-size='10'%3E+%3C/text%3E%3Ctext x='100' y='40' fill='rgba(255,255,255,0.18)' font-family='monospace' font-size='10'%3E-%3C/text%3E%3Ctext x='50' y='120' fill='rgba(255,255,255,0.18)' font-family='monospace' font-size='10'%3E+%3C/text%3E%3Ctext x='130' y='140' fill='rgba(255,255,255,0.18)' font-family='monospace' font-size='10'%3E-%3C/text%3E%3C/svg%3E"), url("data:image/svg+xml,%3Csvg width='250' height='250' viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='30' y='200' fill='rgba(255,255,255,0.28)' font-family='monospace' font-size='16'%3E-%3C/text%3E%3Ctext x='180' y='50' fill='rgba(255,255,255,0.28)' font-family='monospace' font-size='16'%3E+%3C/text%3E%3Ctext x='210' y='220' fill='rgba(255,255,255,0.28)' font-family='monospace' font-size='16'%3E+%3C/text%3E%3C/svg%3E"), url("data:image/svg+xml,%3Csvg width='350' height='350' viewBox='0 0 350 350' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='280' y='300' fill='rgba(255,255,255,0.45)' font-family='monospace' font-size='22'%3E+%3C/text%3E%3Ctext x='60' y='80' fill='rgba(255,255,255,0.45)' font-family='monospace' font-size='22'%3E-%3C/text%3E%3C/svg%3E"); background-size: 150px 150px, 250px 250px, 350px 350px; pointer-events: none; z-index: -1; }
        .nav-blur { background: rgba(2, 2, 2, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .product-card { background: rgba(17, 17, 17, 0.85); border: 1px solid #222; transition: transform 0.3s ease, border-color 0.3s ease; cursor: pointer; backdrop-filter: blur(4px); will-change: transform; }
        .product-card:hover { border-color: #3b82f6; transform: translateY(-5px); box-shadow: 0 20px 40px rgba(59, 130, 246, 0.1); }
        .slider-btn { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); transition: 0.2s; z-index: 50; }
        .slider-btn:hover { background: #3b82f6; transform: scale(1.1); }
        .indicator-dot { height: 4px; border-radius: 2px; transition: all 0.2s ease; background: rgba(255,255,255,0.3); }
        .indicator-active { width: 24px; background: #3b82f6; }
        .indicator-inactive { width: 6px; }
        .gradient-text { background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-overlay { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .admin-input { background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 12px; transition: border-color 0.2s; }
        .admin-input:focus { border-color: #3b82f6; outline: none; }
        .social-icon { background: rgba(255,255,255,0.05); transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1); }
        .social-icon:hover { background: #3b82f6; border-color: #3b82f6; transform: translateY(-3px); }
        img { content-visibility: auto; }
    </style>
</head>
<body>
    <div class="chaos-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBSmzapB-gtDeQNVq-m7GuJP0XF2_94aU",
            authDomain: "crozali-shop.firebaseapp.com",
            databaseURL: "https://crozali-shop-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "crozali-shop",
            storageBucket: "crozali-shop.firebasestorage.app",
            messagingSenderId: "50262512045",
            appId: "1:50262512045:web:a996b63a47480abd941124"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // Optimized Product Card Component
        const ProductCard = React.memo(({ product, onOpen, isAdmin, onDelete }) => {
            const [currentImg, setCurrentImg] = useState(0);

            const next = (e) => { 
                e.stopPropagation(); 
                setCurrentImg(prev => (prev === product.images.length - 1 ? 0 : prev + 1)); 
            };
            const prev = (e) => { 
                e.stopPropagation(); 
                setCurrentImg(prev => (prev === 0 ? product.images.length - 1 : prev - 1)); 
            };

            return (
                <div onClick={() => onOpen(product)} className="product-card rounded-3xl overflow-hidden flex flex-col h-full group relative">
                    {isAdmin && (
                        <button 
                            onClick={(e) => { e.stopPropagation(); if(confirm('Видалити?')) onDelete(product.id); }} 
                            className="absolute top-4 right-4 z-[60] bg-red-600 w-8 h-8 rounded-full flex items-center justify-center font-bold hover:scale-110 transition shadow-lg"
                        >✕</button>
                    )}
                    <div className="relative h-72 overflow-hidden bg-black/40">
                        <img 
                            src={product.images[currentImg]} 
                            loading="lazy"
                            className="w-full h-full object-cover transition-opacity duration-300" 
                            alt={product.name}
                        />
                        <div className="absolute inset-0 flex items-center justify-between px-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={prev} className="slider-btn w-10 h-10 rounded-full text-white flex items-center justify-center">❮</button>
                            <button onClick={next} className="slider-btn w-10 h-10 rounded-full text-white flex items-center justify-center">❯</button>
                        </div>
                        <div className="absolute bottom-4 left-0 right-0 flex justify-center gap-1.5 pointer-events-none">
                            {product.images.map((_, idx) => (
                                <div key={idx} className={`indicator-dot ${idx === currentImg ? 'indicator-active' : 'indicator-inactive'}`}></div>
                            ))}
                        </div>
                    </div>
                    <div className="p-6 flex flex-col flex-grow text-center md:text-left">
                        <h3 className="text-xl font-bold mb-2">{product.name}</h3>
                        <p className="text-gray-400 text-sm mb-6 flex-grow line-clamp-2">{product.description}</p>
                        <div className="flex justify-between items-center mt-auto">
                            <span className="text-2xl font-extrabold text-blue-500">{product.price} ₴</span>
                            <span className="text-blue-400 text-sm font-bold underline">Детальніше</span>
                        </div>
                    </div>
                </div>
            );
        });

        function Modal({ product, onClose }) {
            const [currentImg, setCurrentImg] = useState(0);
            const phone = "380673485909";
            const msg = encodeURIComponent("Добрий день! Цікавить модель: " + product.name);
            const viberUrl = `viber://chat?number=%2B${phone}`;
            const whatsappUrl = `https://wa.me/${phone}?text=${msg}`;

            useEffect(() => { 
                document.body.style.overflow = 'hidden'; 
                return () => { document.body.style.overflow = 'unset'; }; 
            }, []);

            return (
                <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4 md:p-8" onClick={onClose}>
                    <div className="bg-[#111] w-full max-w-5xl max-h-[90vh] rounded-3xl overflow-hidden flex flex-col md:flex-row relative shadow-2xl" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-4 right-4 z-10 w-12 h-12 bg-black/50 hover:bg-red-500 rounded-full text-white text-2xl flex items-center justify-center transition-colors">✕</button>
                        <div className="w-full md:w-3/5 h-[40vh] md:h-auto relative bg-black">
                            <img src={product.images[currentImg]} className="w-full h-full object-contain" alt={product.name}/>
                            <div className="absolute inset-0 flex items-center justify-between px-4">
                                <button onClick={() => setCurrentImg(prev => (prev === 0 ? product.images.length - 1 : prev - 1))} className="slider-btn w-12 h-12 rounded-full text-white flex items-center justify-center">❮</button>
                                <button onClick={() => setCurrentImg(prev => (prev === product.images.length - 1 ? 0 : prev + 1))} className="slider-btn w-12 h-12 rounded-full text-white flex items-center justify-center">❯</button>
                            </div>
                            <div className="absolute bottom-6 left-0 right-0 flex justify-center gap-2 pointer-events-none">
                                {product.images.map((_, idx) => (
                                    <div key={idx} className={`indicator-dot ${idx === currentImg ? 'indicator-active' : 'indicator-inactive'}`}></div>
                                ))}
                            </div>
                        </div>
                        <div className="w-full md:w-2/5 p-8 flex flex-col overflow-y-auto">
                            <h2 className="text-3xl font-bold mb-4">{product.name}</h2>
                            <div className="text-3xl font-extrabold text-blue-500 mb-6">{product.price} ₴</div>
                            <div className="mb-8 flex-grow">
                                <h4 className="text-gray-400 uppercase text-xs font-bold tracking-widest mb-2">Опис моделі</h4>
                                <p className="text-gray-300 leading-relaxed text-lg">{product.description}</p>
                            </div>
                            <div className="space-y-3">
                                <a href={viberUrl} className="w-full bg-[#7360f2] text-white py-3 rounded-2xl font-bold hover:bg-[#6251d4] transition-colors text-center flex items-center justify-center gap-2"><span>💜</span> Viber</a>
                                <a href={whatsappUrl} target="_blank" className="w-full bg-[#25D366] text-white py-3 rounded-2xl font-bold hover:bg-[#1ebd5b] transition-colors text-center flex items-center justify-center gap-2"><span>🟢</span> WhatsApp</a>
                                <a href={`tel:${phone}`} className="w-full bg-white text-black py-3 rounded-2xl font-bold hover:bg-gray-200 transition-colors text-center flex items-center justify-center gap-2"><span>📞</span> Подзвонити</a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [products, setProducts] = useState([]);
            const [filter, setFilter] = useState('all');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAddForm, setShowAddForm] = useState(false);
            const [loginPass, setLoginPass] = useState('');
            const [showLogin, setShowLogin] = useState(false);
            const [newItem, setNewItem] = useState({ name: '', price: '', description: '', img1: '', img2: '', img3: '', gender: 'male' });

            const phone = "380673485909";

            useEffect(() => {
                const productsRef = db.ref('products');
                productsRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                        setProducts(list);
                    } else { setProducts([]); }
                });
                return () => productsRef.off();
            }, []);

            const handleAddProduct = () => {
                const images = [newItem.img1, newItem.img2, newItem.img3].filter(url => url && url.trim() !== '');
                if (!newItem.name || !newItem.price || images.length === 0) return alert("Заповніть назву, ціну та хоча б одне фото!");
                
                db.ref('products').push({
                    name: newItem.name,
                    price: newItem.price,
                    description: newItem.description || "Опис відсутній",
                    gender: newItem.gender,
                    images: images
                }).then(() => {
                    setNewItem({ name: '', price: '', description: '', img1: '', img2: '', img3: '', gender: 'male' });
                    setShowAddForm(false);
                }).catch(err => alert("Помилка: " + err.message));
            };

            const filtered = useMemo(() => 
                products.filter(p => filter === 'all' || p.gender === filter),
                [products, filter]
            );

            return (
                <div className="min-h-screen">
                    <nav className="fixed top-0 w-full z-50 nav-blur">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
                            <span className="text-2xl font-extrabold tracking-tighter">CROZALI</span>
                            <div className="hidden md:flex gap-8 text-sm font-bold uppercase tracking-widest text-white">
                                <a href="#catalog" className="hover:text-blue-500 transition">Каталог</a>
                                <a href="#about" className="hover:text-blue-500 transition">Про нас</a>
                                <a href="#contacts" className="hover:text-blue-500 transition">Контакти</a>
                                {isAdmin && <button onClick={() => setShowAddForm(true)} className="text-blue-500 hover:scale-110 transition">+ Додати</button>}
                            </div>
                        </div>
                    </nav>

                    <section className="pt-48 pb-24 px-6 text-center">
                        <h1 className="text-6xl md:text-8xl font-extrabold mb-6 gradient-text tracking-tighter uppercase leading-tight">Step Into <br/> Future</h1>
                        <p className="text-gray-400 text-xl max-w-2xl mx-auto mb-10 italic">"Найкращий спосіб передбачити майбутнє — створити його власним кроком."</p>
                        <a href="#catalog" className="inline-block bg-blue-600 px-10 py-4 rounded-2xl font-extrabold hover:bg-blue-700 transition shadow-2xl shadow-blue-500/20 uppercase tracking-widest text-sm">ПЕРЕГЛЯНУТИ КАТАЛОГ</a>
                    </section>

                    <section id="catalog" className="py-24 px-6 max-w-6xl mx-auto">
                        <div className="flex flex-col items-center text-center mb-16 gap-8">
                            <div>
                                <h2 className="text-4xl font-bold mb-2">Наш каталог</h2>
                                <p className="text-gray-500 tracking-wide uppercase text-xs font-bold">Обирай свою ідеальну пару</p>
                            </div>
                            <div className="flex flex-wrap justify-center bg-[#111] p-1.5 rounded-2xl border border-white/5">
                                {['all', 'male', 'female'].map(type => (
                                    <button key={type} onClick={() => setFilter(type)} className={`px-8 py-2.5 rounded-xl text-sm font-bold transition ${filter === type ? 'bg-blue-600 text-white' : 'text-gray-400 hover:text-white'}`}>
                                        {type === 'all' ? 'Всі' : type === 'male' ? 'Чоловічі' : 'Жіночі'}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                            {filtered.length > 0 ? filtered.map(p => (
                                <ProductCard 
                                    key={p.id} 
                                    product={p} 
                                    isAdmin={isAdmin} 
                                    onDelete={(id) => db.ref('products/' + id).remove()} 
                                    onOpen={setSelectedProduct} 
                                />
                            )) : (
                                <div className="col-span-full text-center py-10 text-gray-500">Завантаження каталогу або товарів немає...</div>
                            )}
                        </div>
                    </section>

                    {selectedProduct && <Modal product={selectedProduct} onClose={() => setSelectedProduct(null)} />}

                    <section id="about" className="py-24 bg-black/40 border-y border-white/5 backdrop-blur-sm">
                        <div className="max-w-4xl mx-auto px-6 text-center">
                            <h2 className="text-4xl font-bold mb-8 text-blue-500">Ми — Crozali</h2>
                            <div className="text-gray-300 space-y-6 text-lg leading-relaxed font-medium">
                                <p>Понад 8 років ми виготовляємо шкіряне взуття, яке поєднує в собі стиль та комфорт.</p>
                                <p>Наша місія — створювати якісний продукт з гарантією. Також приймаємо індивідуальні замовлення.</p>
                            </div>
                        </div>
                    </section>

                    <footer id="contacts" className="py-24 px-6 max-w-6xl mx-auto text-white">
                        <div className="grid md:grid-cols-2 gap-16">
                            <div className="text-center md:text-left flex flex-col justify-center">
                                <h2 className="text-5xl font-bold mb-8">Маєш питання? <br/><span className="text-blue-500">Ми на зв'язку.</span></h2>
                                <div className="space-y-8">
                                    <a href={`tel:${phone}`} className="flex items-center justify-center md:justify-start gap-4 text-2xl font-bold hover:text-blue-500 transition tracking-tight">
                                        <span className="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center">📞</span>
                                        067 348 59 09
                                    </a>
                                    <div className="flex flex-wrap justify-center md:justify-start gap-4">
                                        <a href={`viber://chat?number=%2B${phone}`} title="Viber" className="social-icon w-14 h-14 rounded-2xl flex items-center justify-center text-2xl">💜</a>
                                        <a href={`https://wa.me/${phone}`} target="_blank" title="WhatsApp" className="social-icon w-14 h-14 rounded-2xl flex items-center justify-center text-2xl">🟢</a>
                                        <a href="https://t.me/crozali" target="_blank" title="Telegram" className="social-icon w-14 h-14 rounded-2xl flex items-center justify-center text-2xl">🔵</a>
                                        <a href="https://www.tiktok.com/@rom4ik45" target="_blank" title="TikTok" className="social-icon w-14 h-14 rounded-2xl flex items-center justify-center text-2xl">📱</a>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-[#111] p-10 rounded-3xl border border-white/5 h-fit text-center shadow-xl flex flex-col justify-center">
                                <h3 className="text-xl font-bold mb-4 uppercase tracking-widest text-blue-500">Графік роботи</h3>
                                <div className="space-y-2 text-lg">
                                    <p className="text-white font-semibold text-2xl">Пн-Пт: <span className="text-gray-400">10:00 — 18:00</span></p>
                                    <p className="text-white font-semibold text-2xl">Сб-Нд: <span className="text-gray-400">11:00 — 18:00</span></p>
                                </div>
                            </div>
                        </div>
                        <div className="mt-24 pt-8 border-t border-white/5 text-center text-gray-600 text-sm">
                             2026 CROZALI.
                        </div>
                    </footer>

                    <button onClick={() => isAdmin ? setIsAdmin(false) : setShowLogin(true)} className="fixed bottom-6 right-6 z-[100] bg-white/5 p-4 rounded-full text-[10px] uppercase font-bold border border-white/10 hover:bg-blue-600 transition">
                        {isAdmin ? 'Вийти' : 'Admin'}
                    </button>

                    {showLogin && (
                        <div className="fixed inset-0 z-[300] bg-black/90 flex items-center justify-center p-6">
                            <div className="bg-[#111] p-8 rounded-3xl border border-blue-500 w-full max-w-sm">
                                <h2 className="text-xl font-bold mb-4">Вхід в адмін-панель</h2>
                                <input type="password" placeholder="Пароль" className="admin-input" value={loginPass} onChange={e => setLoginPass(e.target.value)} />
                                <button onClick={() => { if(loginPass === '653160') { setIsAdmin(true); setShowLogin(false); setLoginPass(''); } else { alert('Невірний пароль'); } }} className="w-full bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Увійти</button>
                                <button onClick={() => setShowLogin(false)} className="w-full mt-2 text-gray-500">Скасувати</button>
                            </div>
                        </div>
                    )}

                    {showAddForm && (
                        <div className="fixed inset-0 z-[300] bg-black/95 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-[#111] p-8 rounded-3xl border border-white/10 w-full max-w-lg">
                                <h2 className="text-2xl font-bold mb-6 text-blue-500 uppercase">Додати модель</h2>
                                <input placeholder="Назва моделі" className="admin-input" value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} />
                                <input placeholder="Ціна (тільки цифри)" type="number" className="admin-input" value={newItem.price} onChange={e => setNewItem({...newItem, price: e.target.value})} />
                                <textarea placeholder="Опис" className="admin-input h-24" value={newItem.description} onChange={e => setNewItem({...newItem, description: e.target.value})} />
                                <input placeholder="URL Фото 1" className="admin-input" value={newItem.img1} onChange={e => setNewItem({...newItem, img1: e.target.value})} />
                                <input placeholder="URL Фото 2" className="admin-input" value={newItem.img2} onChange={e => setNewItem({...newItem, img2: e.target.value})} />
                                <input placeholder="URL Фото 3" className="admin-input" value={newItem.img3} onChange={e => setNewItem({...newItem, img3: e.target.value})} />
                                <select className="admin-input" value={newItem.gender} onChange={e => setNewItem({...newItem, gender: e.target.value})}>
                                    <option value="male">Чоловіче</option>
                                    <option value="female">Жіноче</option>
                                </select>
                                <div className="flex gap-4 mt-4">
                                    <button onClick={handleAddProduct} className="flex-1 bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-700 transition">ЗБЕРЕГТИ</button>
                                    <button onClick={() => setShowAddForm(false)} className="flex-1 bg-white/5 py-4 rounded-xl font-bold hover:bg-white/10 transition">СКАСУВАТИ</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
