<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crozali | Admin Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #020202; color: white; }
        .nav-blur { background: rgba(2, 2, 2, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .product-card { background: #111; border: 1px solid #222; transition: 0.3s; }
        .product-card:hover { border-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_DATA = [
            { id: '1', name: 'Чоловічі Монкі', gender: 'male', price: 3000, images: ['https://i.ibb.co/rWJwTzn/2026-03-17-154838389.png'], description: 'Класика та стиль.' },
            { id: '2', name: 'Жіноча класика', gender: 'female', price: 2500, images: ['https://i.ibb.co/qYB5xSy5/image.png'], description: 'Масивна підошва.' }
        ];

        function App() {
            const [products, setProducts] = useState(() => {
                const saved = localStorage.getItem('crozali_db');
                return saved ? JSON.parse(saved) : INITIAL_DATA;
            });
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [pass, setPass] = useState('');

            // Проста перевірка пароля
            const handleLogin = () => {
                if (pass === "653160") {
                    setIsAdmin(true);
                    setShowLogin(false);
                    setPass('');
                } else {
                    alert('Спробуйте пароль: 653160');
                }
            };

            return (
                <div className="min-h-screen p-10">
                    <nav className="fixed top-0 left-0 w-full h-20 nav-blur flex items-center justify-between px-10 z-50">
                        <h1 className="text-2xl font-black tracking-tighter">CROZALI</h1>
                        {isAdmin && <span className="text-blue-500 font-bold text-xs uppercase">Режим Адміна</span>}
                    </nav>

                    <div className="mt-32 grid grid-cols-1 md:grid-cols-3 gap-6">
                        {products.map(p => (
                            <div key={p.id} className="product-card p-6 rounded-3xl relative">
                                {isAdmin && (
                                    <button 
                                        onClick={() => setProducts(products.filter(item => item.id !== p.id))}
                                        className="absolute top-4 right-4 bg-red-600 w-8 h-8 rounded-full"
                                    >✕</button>
                                )}
                                <img src={p.images[0]} className="w-full h-48 object-cover rounded-2xl mb-4" />
                                <h3 className="text-xl font-bold">{p.name}</h3>
                                <p className="text-blue-500 font-bold text-lg">{p.price} ₴</p>
                            </div>
                        ))}
                    </div>

                    <button 
                        onClick={() => isAdmin ? setIsAdmin(false) : setShowLogin(true)}
                        className="fixed bottom-6 right-6 bg-white/10 px-6 py-3 rounded-xl text-xs font-bold"
                    >
                        {isAdmin ? "ВИЙТИ" : "АДМІН"}
                    </button>

                    {showLogin && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[100]">
                            <div className="bg-[#111] p-10 rounded-[40px] border border-blue-500 w-80 text-center">
                                <p className="mb-4 text-xs font-bold text-gray-400">ВВЕДІТЬ ПАРОЛЬ</p>
                                <input 
                                    type="password" 
                                    className="w-full p-4 bg-black border border-gray-800 rounded-2xl mb-4 text-center" 
                                    value={pass}
                                    onChange={e => setPass(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleLogin()}
                                />
                                <button onClick={handleLogin} className="w-full bg-blue-600 py-4 rounded-2xl font-bold">УВІЙТИ</button>
                                <button onClick={() => setShowLogin(false)} className="mt-4 text-[10px] text-gray-500">СКАСУВАТИ</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
