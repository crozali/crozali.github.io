<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crozali | Магазин преміального взуття</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020202; 
            color: white; 
            scroll-behavior: smooth; 
            position: relative;
            overflow-x: hidden;
        }

        .chaos-bg {
            position: fixed;
            inset: 0;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='150' height='150' viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='20' fill='rgba(255,255,255,0.18)' font-family='monospace' font-size='10'%3E+%3C/text%3E%3Ctext x='100' y='40' fill='rgba(255,255,255,0.18)' font-family='monospace' font-size='10'%3E-%3C/text%3E%3Ctext x='50' y='120' fill='rgba(255,255,255,0.18)' font-family='monospace' font-size='10'%3E+%3C/text%3E%3Ctext x='130' y='140' fill='rgba(255,255,255,0.18)' font-family='monospace' font-size='10'%3E-%3C/text%3E%3C/svg%3E"),
                url("data:image/svg+xml,%3Csvg width='250' height='250' viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='30' y='200' fill='rgba(255,255,255,0.28)' font-family='monospace' font-size='16'%3E-%3C/text%3E%3Ctext x='180' y='50' fill='rgba(255,255,255,0.28)' font-family='monospace' font-size='16'%3E+%3C/text%3E%3Ctext x='210' y='220' fill='rgba(255,255,255,0.28)' font-family='monospace' font-size='16'%3E+%3C/text%3E%3C/svg%3E");
            background-size: 150px 150px, 250px 250px;
            pointer-events: none;
            z-index: -1;
        }

        .nav-blur { background: rgba(2, 2, 2, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .product-card { background: rgba(17, 17, 17, 0.85); border: 1px solid #222; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; backdrop-filter: blur(4px); }
        .product-card:hover { border-color: #3b82f6; transform: translateY(-5px); box-shadow: 0 20px 40px rgba(59, 130, 246, 0.1); }
        
        .indicator-dot { height: 4px; border-radius: 2px; transition: all 0.3s ease; background: rgba(255,255,255,0.3); }
        .indicator-active { width: 24px; background: #3b82f6; }
        .indicator-inactive { width: 6px; }

        .gradient-text { background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-overlay { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); animation: fadeIn 0.3s ease; }
        
        /* Стиль для адмін-вікна */
        .admin-panel {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="chaos-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_PRODUCTS = [
            { id: '1', name: 'Чоловічі Монкі', gender: 'male', price: 3000, images: ['https://i.ibb.co/rWJwTzn/2026-03-17-154838389.png', 'https://i.ibb.co/PZQZqMft/image.png'], description: 'Класика, що не потребує представлення.' },
            { id: '2', name: 'Жіноча класика', gender: 'female', price: 2500, images: ['https://i.ibb.co/qYB5xSy5/image.png'], description: 'Масивна підошва та преміальна шкіра.' }
        ];

        // --- Компоненти з попереднього коду ---
        function ProductCard({ product, onOpen }) {
            const [currentImg, setCurrentImg] = useState(0);
            return (
                <div onClick={() => onOpen(product)} className="product-card rounded-3xl overflow-hidden flex flex-col h-full group">
                    <div className="relative h-72 overflow-hidden bg-black/40">
                        <img src={product.images[currentImg]} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                        <div className="absolute bottom-4 left-0 right-0 flex justify-center gap-1.5 pointer-events-none">
                            {product.images.map((_, idx) => (
                                <div key={idx} className={`indicator-dot ${idx === currentImg ? 'indicator-active' : 'indicator-inactive'}`}></div>
                            ))}
                        </div>
                    </div>
                    <div className="p-6 flex flex-col flex-grow">
                        <h3 className="text-xl font-bold mb-2">{product.name}</h3>
                        <div className="flex justify-between items-center mt-auto">
                            <span className="text-2xl font-extrabold text-blue-500">{product.price} ₴</span>
                            <span className="text-blue-400 text-sm font-bold underline">Детальніше</span>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [filter, setFilter] = useState('all');
            const [selectedProduct, setSelectedProduct] = useState(null);
            
            // Стан для адмінки
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const CORRECT_PASSWORD = "1234"; // Твій пароль тут

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === CORRECT_PASSWORD) {
                    setIsAdmin(true);
                    setShowAdminLogin(false);
                    setError('');
                } else {
                    setError('Невірний пароль!');
                }
            };

            const filtered = INITIAL_PRODUCTS.filter(p => filter === 'all' || p.gender === filter);

            return (
                <div className="min-h-screen relative">
                    <nav className="fixed top-0 w-full z-50 nav-blur">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
                            <span className="text-2xl font-extrabold tracking-tighter">CROZALI</span>
                            <div className="hidden md:flex gap-8 text-sm font-bold uppercase tracking-widest text-white">
                                <a href="#catalog" className="hover:text-blue-500 transition">Каталог</a>
                                <a href="#about" className="hover:text-blue-500 transition">Про нас</a>
                            </div>
                        </div>
                    </nav>

                    <section className="pt-48 pb-24 px-6 text-center">
                        <h1 className="text-6xl md:text-8xl font-extrabold mb-6 gradient-text tracking-tighter uppercase">Step Into <br/> Future</h1>
                        <a href="#catalog" className="inline-block bg-blue-600 px-10 py-4 rounded-2xl font-extrabold hover:bg-blue-700 transition uppercase tracking-widest text-sm">КАТАЛОГ</a>
                    </section>

                    <section id="catalog" className="py-24 px-6 max-w-6xl mx-auto">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                            {filtered.map(p => <ProductCard key={p.id} product={p} onOpen={setSelectedProduct} />)}
                        </div>
                    </section>

                    {/* --- КНОПКА АДМІНА (справа внизу) --- */}
                    <button 
                        onClick={() => isAdmin ? alert('Ви вже в системі!') : setShowAdminLogin(true)}
                        className="fixed bottom-6 right-6 z-[60] bg-white/5 hover:bg-blue-600/20 border border-white/10 p-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all"
                    >
                        {isAdmin ? '✅ Адмін' : 'Адмін'}
                    </button>

                    {/* --- ВІКНО ПАРОЛЯ --- */}
                    {showAdminLogin && (
                        <div className="fixed inset-0 z-[100] flex items-end justify-end p-6 pointer-events-none">
                            <div className="admin-panel w-72 p-6 rounded-3xl pointer-events-auto animate-fadeIn border-blue-500/30">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-extrabold text-blue-500 uppercase text-xs tracking-tighter">Вхід в систему</h3>
                                    <button onClick={() => setShowAdminLogin(false)} className="text-gray-500 hover:text-white">✕</button>
                                </div>
                                <p className="text-[10px] text-gray-400 mb-4 uppercase font-bold">Введіть пароль для доступу</p>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input 
                                        type="password" 
                                        autoFocus
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        placeholder="Пароль..."
                                        className="w-full bg-black border border-white/10 rounded-xl px-4 py-2 text-sm focus:border-blue-500 outline-none transition"
                                    />
                                    {error && <p className="text-red-500 text-[10px] font-bold">{error}</p>}
                                    <button type="submit" className="w-full bg-blue-600 py-2 rounded-xl text-xs font-extrabold uppercase hover:bg-blue-700 transition">Увійти</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* --- ПАНЕЛЬ КЕРУВАННЯ (з'являється після входу) --- */}
                    {isAdmin && (
                        <div className="fixed top-24 right-6 z-[50] bg-blue-600/90 backdrop-blur-md p-4 rounded-2xl shadow-2xl animate-bounce">
                            <p className="text-[10px] font-black uppercase tracking-widest text-white">Режим редагування увімкнено</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
